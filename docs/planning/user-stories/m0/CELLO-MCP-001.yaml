# ─── Identity ───────────────────────────────────────────────
id: CELLO-MCP-001
domain: MCP Tool Surface
actor: AGENT
priority: P0
components:
  - client

# ─── Intent ─────────────────────────────────────────────────
story: >
  As an AI Agent,
  I want MCP tools to connect to a known peer by multiaddr, send signed messages to that peer, receive signed messages from peers, and check transport status
  so that I can communicate peer-to-peer with another agent from M0 without handling cryptographic operations, libp2p lifecycle, or envelope construction directly.

  **Scope:** This story covers the tool logic, peer registry, input/output schemas, and
  `CelloClient` wiring that live in `@cello/client`. The runnable MCP server process,
  stdio transport, `claude/channel` notification push, key file loading, and `SKILL.md`
  are covered by CELLO-ADAPTER-001 (`@cello/adapter-claude-code`).

  Test infrastructure note: E2E tests in `packages/e2e-tests` exercise this story by
  wiring two `CelloClient` instances through the SDK's `InMemoryTransport.createLinkedPair()`
  against in-process libp2p nodes. The tool registry, schemas, and internal `CelloClient`
  wiring are identical under `InMemoryTransport` and stdio — transport selection happens
  only at the outermost composition layer (in `adapter-claude-code`). This is enforced by
  AC-006 rather than left as convention.

  M0's tool surface is minimal and peer-to-peer — no session concept, no directory, no
  relay. The agent drives peer discovery by supplying a multiaddr to `cello_connect_peer`
  (the test harness hands the peer's multiaddr to the agent out-of-band; in production
  beyond M0, M1's signed SessionAssignment replaces this).

  **Peer registry (client-local, populated by the MCP server).** `cello_connect_peer`
  populates the client's local peer registry (MSG-002) with the triple
  `{peer_pubkey, peer_id, multiaddrs}`. `cello_send({ peer_pubkey })` resolves the pubkey
  to the registry entry and delegates to MSG-002's send path. The registry is not
  persisted across MCP server restarts — a fresh server starts with an empty registry.

  **Binary encoding across the MCP JSON boundary.** All binary values exposed through MCP
  tool inputs and outputs — `peer_pubkey`, `sender_pubkey`, `own_pubkey`, `content_hash`,
  `leaf_hash` — are encoded as **lowercase hex strings with no `0x` prefix**. Multiaddrs
  use the standard multiaddr string form (`/ip4/127.0.0.1/tcp/54321/p2p/<peer-id>`).
  Each tool's input and output schema states this encoding explicitly so an implementing
  agent cannot accidentally mix encodings between a header convention and a tool contract.
  AC-011 below exercises the round-trip: a pubkey returned from `cello_connect_peer` must
  be directly usable as the `peer_pubkey` argument to `cello_send` without any
  case-folding or formatting by the caller.

  **Content type on the MCP boundary.** `cello_send`'s `content` argument is a UTF-8
  string. The envelope's `content` field (MSG-001) is `Uint8Array`; the MCP layer encodes
  the UTF-8 string to bytes at the send boundary and decodes bytes back to a UTF-8 string
  at the `cello_receive` boundary. Binary (non-UTF-8) content support is deferred — adding
  `content_encoding: 'utf8' | 'base64'` as an optional field is a non-breaking extension
  for a later milestone. M0 is text only.

# ─── Behavior (EARS) ───────────────────────────────────────
behavior:
  - trigger: "When the agent calls `cello_connect_peer({ multiaddr })`"
    action: >
      the MCP server shall dial the multiaddr via the libp2p node (CELLO-TRANSPORT-001),
      extract the remote's Peer ID from libp2p's identify exchange, derive the remote's
      Ed25519 public key from the Peer ID, and add the triple `{peer_pubkey, peer_id,
      multiaddrs: [supplied multiaddr, ...any identify-discovered addrs]}` to the local
      peer registry. Returns `{connected: true, peer_pubkey: <lowercase hex, no 0x prefix>}`
      on success or `{connected: false, reason: 'peer_unreachable' | 'dial_failed'}` on
      failure.
  - trigger: "When the agent calls `cello_send({ peer_pubkey, content })` where `content` is a UTF-8 string"
    action: >
      the MCP server shall (a) look up `peer_pubkey` in the local peer registry; if no
      entry exists return `{delivered: false, reason: 'peer_not_connected'}` without
      dialing — the agent must call `cello_connect_peer` first, (b) encode `content` as
      UTF-8 bytes, (c) delegate to MSG-002's send path with the resolved
      `(peer_id, multiaddrs)` and the UTF-8 bytes as envelope content. Returns
      `{delivered: bool, content_hash: hex, reason?: string}`. Failure reasons include
      `peer_not_connected`, `peer_unreachable`, `connection_lost`, `remote_rejected`, and
      `content_too_large` (when the UTF-8-encoded byte length exceeds 1,048,576). The
      `content_hash` field is populated on success and on `remote_rejected` (the envelope
      was constructed and hashed before the remote rejected it); it is null on every
      other failure reason.
  - trigger: "When the agent calls `cello_receive({ peer_pubkey?, timeout_ms })`"
    action: >
      the MCP server shall block until an envelope matching `peer_pubkey` (if supplied;
      otherwise any peer) arrives in the receive queue, returning `{type: 'message',
      content: <UTF-8 string decoded from envelope bytes>, sender_pubkey: hex,
      content_hash: hex, timestamp: int}`. If no matching envelope arrives within
      `timeout_ms` the call returns `{type: 'timeout'}`. Envelopes from peers OTHER than
      the filter peer are NOT consumed from the queue — a filtered receive must leave
      unrelated messages in place for subsequent `cello_receive` calls. When no
      `peer_pubkey` filter is supplied the next envelope from any peer is returned. Queue
      ordering is arrival-order — M0 has no sequence numbers, so "arrival" is
      first-written-first-read by the receive handler (MSG-002). If the envelope's content
      bytes do not decode as valid UTF-8 the message is surfaced with
      `{type: 'decode_error', sender_pubkey, content_hash}` — M0 is text-only on the MCP
      boundary.
  - trigger: "When the agent calls `cello_list_peers()`"
    action: >
      the MCP server shall return an array of `{peer_pubkey: hex, multiaddrs: string[],
      connected: bool}` for every peer the client currently has a connection to. Peers
      that have disconnected but were previously known in this process are not listed —
      M0 does not persist peer state.
  - trigger: "When the agent calls `cello_status()`"
    action: "the MCP server shall return `{transport_started: bool, own_pubkey: hex, listen_addresses: string[], connected_peer_count: int, uptime_seconds: int}`."
  - trigger: "When any MCP tool is called before the transport has been started"
    action: "the MCP server shall return a structured `{error: {reason: 'transport_not_started'}}` response. The transport is started by the MCP server's initialization — not on demand per tool call — so this error indicates an initialization failure or a misconfigured harness."
  - trigger: "When the MCP server factory is invoked with a transport argument"
    action: "the factory shall register the M0 tool set identically under stdio and InMemoryTransport: the registered tool names, input schemas, output schemas, and the constructed server's internal client wiring must match exactly between the two invocations."

# ─── Acceptance Criteria ────────────────────────────────────
acceptance_criteria:
  - id: AC-001
    given: "Two MCP server instances A and B running against in-process libp2p nodes; B's listen multiaddr is known to the test harness"
    when: "Agent A calls `cello_connect_peer({ multiaddr: <B's multiaddr> })`"
    then: "The call returns `{connected: true, peer_pubkey: <B's pubkey hex>}`; B's MCP server sees an inbound connection on its libp2p node"
    test_type: e2e
    component_under_test: client

  - id: AC-002
    given: "Two MCP server instances A and B with an established connection"
    when: "Agent A calls `cello_send({ peer_pubkey: <B's pubkey>, content: 'hello' })`"
    then: >
      The call returns `{delivered: true, content_hash: <hex>}`; Agent B's
      `cello_receive({ timeout_ms: 5000 })` returns `{type: 'message', content: 'hello',
      sender_pubkey: <A's pubkey hex>, content_hash: <hex>, timestamp: <int>}` before
      timeout
    test_type: e2e
    component_under_test: client

  - id: AC-003
    given: "An MCP server instance with no peer connections"
    when: "Agent calls `cello_receive({ timeout_ms: 200 })`"
    then: "The call returns `{type: 'timeout'}` after approximately 200ms"
    test_type: e2e
    component_under_test: client

  - id: AC-004
    given: "An MCP server instance A with no established connection to peer B"
    when: "Agent A calls `cello_send({ peer_pubkey: <B's pubkey>, content: 'hi' })` without first calling `cello_connect_peer`"
    then: "The call returns `{delivered: false, reason: 'peer_not_connected'}`; no dial is attempted; no envelope is constructed"
    test_type: e2e
    component_under_test: client

  - id: AC-005
    given: "An MCP server instance"
    when: "Agent calls `cello_status()`"
    then: "The response includes `transport_started: true`, `own_pubkey` (32-byte hex), a non-empty `listen_addresses` array, `connected_peer_count` (integer), and `uptime_seconds` (non-negative integer)"
    test_type: e2e
    component_under_test: client

  - id: AC-006
    given: "The MCP server is produced by a shared factory that accepts a transport argument"
    when: "The factory is invoked once with an SDK `InMemoryTransport` (as in tests) and once with stdio transport (as in production)"
    then: >
      The set of registered tool names, tool input schemas, tool output schemas, and the
      constructed server's internal client wiring (libp2p node reference, signing key
      source, receive queue) are identical in both invocations, verified by structural
      equality (or snapshot) on the server's tool registry and an assertion that the same
      client instance type is injected. Transport is the only differing input
    test_type: unit
    component_under_test: client

  - id: AC-007
    given: "Two MCP server instances A and B with an established connection"
    when: "Agent A sends 5 messages to B, Agent B sends 3 messages to A — all with distinct content strings"
    then: >
      After both agents drain their receive queues via `cello_receive`, A has received B's
      3 messages and B has received A's 5 messages; every received message has a verifying
      signature and a matching content_hash; no cross-contamination between the two
      directions
    test_type: e2e
    component_under_test: client

  - id: AC-008
    given: "Three MCP server instances A, B, C all mutually connected"
    when: "A calls `cello_list_peers()`"
    then: "The response lists two peers: B's pubkey + multiaddr + connected:true, and C's pubkey + multiaddr + connected:true. Ordering is unspecified"
    test_type: e2e
    component_under_test: client

  - id: AC-009
    given: "An MCP server whose transport has failed to start (e.g., listen port binding failed in the initialization path)"
    when: "Agent calls any tool"
    then: "Every tool returns `{error: {reason: 'transport_not_started'}}`; the MCP server itself remains responsive to introspection (tool list query succeeds)"
    test_type: unit
    component_under_test: client

  - id: AC-010
    given: "An MCP server instance A with an established connection to B"
    when: "Agent A calls `cello_send({ peer_pubkey: <B's pubkey>, content: <a string whose UTF-8 encoding is 1,048,577 bytes> })`"
    then: "The call returns `{delivered: false, reason: 'content_too_large', content_hash: null}`; no libp2p stream is opened; A's server remains healthy"
    test_type: e2e
    component_under_test: client

  - id: AC-011
    given: "An MCP server instance A that has just called `cello_connect_peer({ multiaddr })` and received `{connected: true, peer_pubkey: P_hex}`"
    when: "Agent A calls `cello_send({ peer_pubkey: P_hex, content: 'hello' })` passing the SAME string `P_hex` it just received, with no case-folding, trimming, or re-encoding"
    then: >
      The send succeeds — the peer_pubkey round-trip from `cello_connect_peer` output to
      `cello_send` input works with the exact string value. The hex encoding is
      deterministically lowercase and carries no `0x` prefix, per the MCP boundary
      convention stated in the story intent. An implementation that returns uppercase hex
      from one tool and accepts only lowercase in another would fail this AC
    test_type: e2e
    component_under_test: client

  - id: AC-012
    given: "Three MCP servers A, B, C all mutually connected; C sends a message to A; B sends nothing"
    when: "Agent A calls `cello_receive({ peer_pubkey: <B's pubkey>, timeout_ms: 200 })`"
    then: >
      The call returns `{type: 'timeout'}` after ~200ms. C's message remains in A's
      queue — the filtered receive MUST NOT consume it. A subsequent
      `cello_receive({ peer_pubkey: <C's pubkey>, timeout_ms: 200 })` returns C's message
      immediately
    test_type: e2e
    component_under_test: client

# ─── Security Invariants ───────────────────────────────────
security_invariants:
  - id: SI-001
    statement: "The MCP server shall never expose K_local private key material through any tool response"
    adversarial_condition: "even when `cello_status` or error responses include diagnostic information"
    test_type: unit
    component_under_test: client

  - id: SI-002
    statement: >
      The MCP server shall never deliver received message content to the agent without the
      underlying client (MSG-002) having verified both the content_hash and the sender
      signature. If either check fails the message must not appear in any
      `cello_receive` response.
    adversarial_condition: >
      even when the libp2p transport delivered a message with a valid structure but a
      forged signature or a mismatched content_hash.
    test_type: e2e
    component_under_test: client

