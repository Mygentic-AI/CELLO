# ─── Identity ───────────────────────────────────────────────
id: CELLO-MSG-001
domain: Message Exchange
actor: CLIENT
priority: P0
components:
  - protocol-types

# ─── Intent ─────────────────────────────────────────────────
story: >
  As the CELLO Client,
  I want a signed message envelope schema that bundles content with its Ed25519 signature and sender pubkey
  so that every peer-to-peer message on the wire is self-describing, verifiable, and parseable by any CELLO component.

  M0 has no directory, no relay, and no session concept — two libp2p peers dial each other
  directly and exchange a single signed envelope over a custom stream protocol
  (see CELLO-TRANSPORT-001 and CELLO-MSG-002). The envelope schema therefore does not carry
  `session_id` or `sequence_number`; those fields are introduced in M1 (CELLO-MSG-003) when
  sessions and the per-session Merkle tree arrive. Keeping them out of M0 means the M0 TBS
  is genuinely minimal — signed authorship over content — and M1's version bump is an honest
  reshape rather than an incremental field addition.

# ─── Behavior (EARS) ───────────────────────────────────────
behavior:
  - trigger: "When the client constructs an outbound message in M0"
    action: >
      the protocol-types module shall produce a MessageEnvelope v0 containing: `protocol_version`
      (CBOR unsigned integer, constant `0` in M0), `sender_pubkey` (32 bytes, the sender's
      Ed25519 K_local public key), `content` (arbitrary bytes, up to 1 MiB), `content_hash`
      (32 bytes, `SHA-256(0x00 || content)` — the Merkle leaf-hash primitive from CRYPTO-002),
      `timestamp` (Unix milliseconds, CBOR unsigned integer), and `sender_signature` (64-byte
      Ed25519 over canonical-CBOR of the TBS). The wire encoding is canonical CBOR (RFC 8949
      §4.2.1 Core Deterministic Encoding). The TBS is the positional array
      `[protocol_version, content_hash, sender_pubkey, timestamp]`. Positional array (not map)
      eliminates key-ordering ambiguity. Content is not in the TBS — `content_hash` already
      commits to it. `protocol_version` is the first element so an unknown version is
      detectable without parsing any subsequent field. Value `1` is reserved for M1's
      Structure 1 envelope.
  - trigger: "When any component receives a MessageEnvelope v0"
    action: "the protocol-types module shall validate structure: all required fields present; protocol_version = 0; sender_pubkey length = 32; content_hash length = 32; sender_signature length = 64; timestamp is a non-negative integer; content (if present) is ≤ 1 MiB."
  - trigger: "When a MessageEnvelope has a missing or malformed field"
    action: "the protocol-types module shall reject it with a structured error identifying the invalid field."
  - trigger: "When envelope construction is called with content exceeding 1,048,576 bytes (1 MiB)"
    action: "the protocol-types module shall reject the construction with a structured `content_too_large` error and shall not compute a content_hash, signature, or partial envelope. The same limit is enforced on the validation path: inbound envelopes carrying content larger than 1 MiB are rejected with the same error."
  - trigger: "When a caller supplies a pre-computed content_hash to envelope construction"
    action: "the module shall ignore it and always recompute from content — the content_hash field cannot be decoupled from the payload."
  - trigger: "When a validator encounters an envelope whose protocol_version is not in the set supported by the current build"
    action: "the module shall reject it with a structured `unsupported_version` error before any downstream handling. The M0 build supports only `{0}`."

# ─── Acceptance Criteria ────────────────────────────────────
acceptance_criteria:
  - id: AC-001
    given: "Valid content, a keypair, and a timestamp"
    when: "The client constructs a MessageEnvelope v0"
    then: >
      All fields are populated; `protocol_version` equals 0; `content_hash` equals
      `SHA-256(0x00 || content)`; `sender_signature` verifies against `sender_pubkey` over
      canonical-CBOR of the TBS `[0, content_hash, sender_pubkey, timestamp]`
    test_type: unit
    component_under_test: protocol-types

  - id: AC-002
    given: "A well-formed MessageEnvelope v0"
    when: "Structural validation is performed"
    then: "Validation passes with no errors"
    test_type: unit
    component_under_test: protocol-types

  - id: AC-003
    given: "A MessageEnvelope with sender_pubkey removed"
    when: "Structural validation is performed"
    then: "Validation fails with an error identifying sender_pubkey as missing"
    test_type: unit
    component_under_test: protocol-types

  - id: AC-004
    given: "A MessageEnvelope with a 31-byte sender_pubkey OR a 63-byte sender_signature OR a 31-byte content_hash"
    when: "Structural validation is performed"
    then: "Validation fails with an error identifying the malformed field in each case"
    test_type: unit
    component_under_test: protocol-types

  - id: AC-005
    given: "A MessageEnvelope with timestamp set to -1"
    when: "Structural validation is performed"
    then: "Validation fails with an error identifying timestamp as invalid"
    test_type: unit
    component_under_test: protocol-types

  - id: AC-006
    given: "A valid MessageEnvelope"
    when: "Serialized to canonical CBOR and deserialized back"
    then: "The deserialized envelope is identical; the signature still verifies; re-serializing produces byte-identical CBOR"
    test_type: unit
    component_under_test: protocol-types

  - id: AC-007
    given: "A valid MessageEnvelope signed with TBS = [0, content_hash, sender_pubkey, timestamp]"
    when: "Any single TBS field is mutated after signing (protocol_version substituted, content_hash replaced, sender_pubkey substituted, or timestamp moved)"
    then: "Signature verification fails for each mutation"
    test_type: unit
    component_under_test: protocol-types

  - id: AC-008
    given: >
      A fixed TBS fixture stored under `packages/protocol-types/test/vectors/tbs-v0-canonical.json`
      specifying exact values for protocol_version (integer, 0), content_hash (hex), sender_pubkey
      (hex), and timestamp (integer), together with the expected canonical-CBOR encoding as a hex
      string. The expected hex is committed and reviewed — it serves as the cross-implementation
      contract the future Rust port must match byte-for-byte
    when: "The TypeScript implementation encodes the TBS fixture values to canonical CBOR"
    then: "The produced bytes equal the expected hex in the fixture exactly"
    test_type: unit
    component_under_test: protocol-types

  - id: AC-009
    given: "Content of exactly 1,048,576 bytes (1 MiB)"
    when: "The client constructs a MessageEnvelope"
    then: "Construction succeeds"
    test_type: unit
    component_under_test: protocol-types

  - id: AC-010
    given: "Content of 1,048,577 bytes (1 MiB + 1)"
    when: "The client constructs a MessageEnvelope"
    then: "Construction is rejected with a structured `content_too_large` error; no content_hash or signature is computed"
    test_type: unit
    component_under_test: protocol-types

  - id: AC-011
    given: "A received MessageEnvelope whose content field exceeds 1,048,576 bytes"
    when: "Structural validation is performed"
    then: "Validation fails with a `content_too_large` error"
    test_type: unit
    component_under_test: protocol-types

  - id: AC-012
    given: "A received MessageEnvelope whose content field has been modified such that its leaf hash no longer equals content_hash"
    when: "Structural validation is performed"
    then: "Validation fails with a `content_hash_mismatch` error before signature verification is attempted"
    test_type: unit
    component_under_test: protocol-types

  - id: AC-013
    given: "A received MessageEnvelope whose protocol_version is `1` (a value not supported by the M0 build)"
    when: "Structural validation is performed"
    then: "Validation fails with `unsupported_version`; no signature verification is attempted"
    test_type: unit
    component_under_test: protocol-types

# ─── Security Invariants ───────────────────────────────────
security_invariants:
  - id: SI-001
    statement: >
      The protocol-types module shall never emit a MessageEnvelope whose content_hash field
      was not computed from the content field by the module itself. The envelope constructor
      must ignore any caller-supplied content_hash and always recompute it from the content.
    adversarial_condition: >
      even when a caller passes a pre-computed content_hash through the construction API in
      an attempt to decouple the hash from the payload.
    test_type: unit
    component_under_test: protocol-types

  - id: SI-002
    statement: "The protocol-types module shall never construct a MessageEnvelope with an invalid signature"
    adversarial_condition: "even when called rapidly in sequence with different content"
    test_type: unit
    component_under_test: protocol-types

  - id: SI-003
    statement: >
      A validator shall reject a MessageEnvelope where any TBS field (protocol_version,
      content_hash, sender_pubkey, timestamp) has been altered relative to what was signed.
    adversarial_condition: >
      even when the altered envelope is otherwise structurally well-formed and the original
      signature bytes are retained.
    test_type: unit
    component_under_test: protocol-types

  - id: SI-004
    statement: >
      The protocol-types module shall reject any MessageEnvelope whose TBS protocol_version
      is not in the set of versions supported by the current build. The M0 build supports
      only protocol_version = 0.
    adversarial_condition: >
      even when the envelope is otherwise structurally well-formed and its signature verifies
      against the altered TBS — an unsupported version must be refused before any application
      logic is invoked, so future TBS changes cannot be silently misinterpreted by an M0 peer.
    test_type: unit
    component_under_test: protocol-types

