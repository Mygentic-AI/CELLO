# ─── Identity ───────────────────────────────────────────────
id: CELLO-MSG-001
domain: Message Exchange
actor: CLIENT
priority: P0
components:
  - protocol-types

# ─── Intent ─────────────────────────────────────────────────
story: >
  As the CELLO Client,
  I want a signed message envelope schema that bundles content with its Ed25519 signature and sender metadata
  so that every message on the wire is self-describing, verifiable, and parseable by any CELLO component.

# ─── Behavior (EARS) ───────────────────────────────────────
behavior:
  - trigger: "When the client constructs an outbound message"
    action: >
      the protocol-types module shall produce a MessageEnvelope containing: sender_pubkey (32 bytes),
      session_id, sequence_number, content (arbitrary bytes), content_hash (SHA-256 leaf hash of the content),
      signature (64-byte Ed25519), and timestamp (Unix milliseconds). The wire encoding is canonical CBOR (RFC 8949).
      The signature is computed over the canonical-CBOR encoding of the to-be-signed (TBS) array
      `[sender_pubkey, session_id, sequence_number, content_hash, timestamp]` — a positional array, not a map,
      so implementations never need to canonicalize map key order. Content is not in the TBS structure because
      content_hash already commits to it. All implementations must produce byte-identical CBOR for the same
      logical TBS to interoperate.
  - trigger: "When any component receives a MessageEnvelope"
    action: "the protocol-types module shall validate the envelope structure: all required fields present, sender_pubkey is 32 bytes, signature is 64 bytes, content_hash is 32 bytes, sequence_number is a non-negative integer"
  - trigger: "When a MessageEnvelope has a missing or malformed field"
    action: "the protocol-types module shall reject it with a structured error identifying the invalid field"

# ─── Acceptance Criteria ────────────────────────────────────
acceptance_criteria:
  - id: AC-001
    given: "Valid content, a keypair, a session_id, a sequence_number, and a timestamp"
    when: "The client constructs a MessageEnvelope"
    then: >
      All fields are populated; content_hash equals the SHA-256 leaf hash of the content;
      the signature verifies against sender_pubkey over canonical-CBOR(TBS) where
      TBS = [sender_pubkey, session_id, sequence_number, content_hash, timestamp]
    test_type: unit
    component_under_test: protocol-types

  - id: AC-002
    given: "A well-formed MessageEnvelope"
    when: "Structural validation is performed"
    then: "Validation passes with no errors"
    test_type: unit
    component_under_test: protocol-types

  - id: AC-003
    given: "A MessageEnvelope with sender_pubkey removed"
    when: "Structural validation is performed"
    then: "Validation fails with an error identifying sender_pubkey as missing"
    test_type: unit
    component_under_test: protocol-types

  - id: AC-004
    given: "A MessageEnvelope with a 31-byte sender_pubkey"
    when: "Structural validation is performed"
    then: "Validation fails with an error identifying sender_pubkey as malformed"
    test_type: unit
    component_under_test: protocol-types

  - id: AC-005
    given: "A MessageEnvelope with sequence_number set to -1"
    when: "Structural validation is performed"
    then: "Validation fails with an error identifying sequence_number as invalid"
    test_type: unit
    component_under_test: protocol-types

  - id: AC-006
    given: "A valid MessageEnvelope"
    when: "Serialized to canonical CBOR and deserialized back"
    then: "The deserialized envelope is identical to the original; the signature still verifies; re-serializing produces byte-identical CBOR"
    test_type: unit
    component_under_test: protocol-types

  - id: AC-007
    given: "A valid MessageEnvelope signed with TBS = [sender_pubkey, session_id, sequence_number, content_hash, timestamp]"
    when: "Any single TBS field is mutated after signing (session_id swapped, sequence_number changed, timestamp moved, sender_pubkey substituted, or content_hash replaced)"
    then: "Signature verification fails for each mutation"
    test_type: unit
    component_under_test: protocol-types

# ─── Security Invariants ───────────────────────────────────
security_invariants:
  - id: SI-001
    statement: "A validator shall reject a MessageEnvelope whose content_hash does not match the content"
    adversarial_condition: "even when the signature over the mismatched content_hash is valid (attacker signed a hash that doesn't match the payload)"
    test_type: unit
    component_under_test: protocol-types

  - id: SI-002
    statement: "The protocol-types module shall never construct a MessageEnvelope with an invalid signature"
    adversarial_condition: "even when called rapidly in sequence with different content"
    test_type: unit
    component_under_test: protocol-types

  - id: SI-003
    statement: "A validator shall reject a MessageEnvelope where any TBS field (sender_pubkey, session_id, sequence_number, content_hash, or timestamp) has been altered relative to what was signed"
    adversarial_condition: "even when the altered envelope is otherwise structurally well-formed and the original signature bytes are retained"
    test_type: unit
    component_under_test: protocol-types

