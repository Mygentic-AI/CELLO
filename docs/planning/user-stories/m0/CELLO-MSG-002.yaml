# ─── Identity ───────────────────────────────────────────────
id: CELLO-MSG-002
domain: Message Exchange
actor: CLIENT
priority: P0
components:
  - client

# ─── Intent ─────────────────────────────────────────────────
story: >
  As the CELLO Client,
  I want to send a signed MessageEnvelope to a known peer over a libp2p stream and receive signed envelopes from peers, verifying every inbound envelope before delivery to the agent
  so that two M0 peers can exchange tamper-evident messages directly, with no directory or relay between them.

  M0's message flow is minimal and peer-to-peer. The sender opens a libp2p stream on
  `/cello/m0/1.0.0` (CELLO-TRANSPORT-001), writes the canonical-CBOR encoding of a
  MessageEnvelope v0 (MSG-001) as a single `it-length-prefixed` frame, and closes the
  write side. The receiver reads the length-prefixed frame, parses the CBOR, validates
  the envelope structure, verifies the content_hash against the content, verifies
  the sender's Ed25519 signature against the envelope's `sender_pubkey`, and delivers the
  content to the agent through the MCP surface (MCP-001).

  **Framing.** The M0 stream uses the libp2p-ecosystem `it-length-prefixed` convention —
  a varint length prefix followed by exactly that many payload bytes. This matches what
  the rest of the libp2p substream ecosystem uses; it is NOT a bespoke fixed-width
  length encoding.

  **Delivery confirmation micro-protocol.** The send-side return value distinguishes three
  outcomes on every send, and the three outcomes correspond to three observable
  receiver-side behaviors. The receiver never sends an application-level ACK frame —
  delivery is signaled purely through libp2p stream lifecycle events:

  | Sender observation | Receiver behavior | Sender return |
  |---|---|---|
  | Stream closes cleanly (EOF from receiver) | Receiver enqueued the envelope and closed | `{delivered: true}` |
  | Stream is reset (libp2p abort from receiver) | Receiver rejected at validation | `{delivered: false, reason: 'remote_rejected'}` |
  | Connection drops (transport error, not a reset) | Neither peer controlled the termination | `{delivered: false, reason: 'connection_lost'}` |

  The sender writes its CBOR envelope, closes its write side, and awaits the read-side
  close event. A clean close means the receiver finished processing (which for the
  receiver means validation passed and the envelope was enqueued, OR validation failed
  and the stream was reset — the two are distinguishable by the close type: `close` vs.
  `reset`). The receiver never sends a success or failure frame — the stream lifecycle
  is the signal.

  No directory, no relay, no session concept, no sequence numbers. The sender knows the
  receiver's multiaddr and Peer ID out-of-band (hardcoded in the test harness; in
  production eventually via M1's signed SessionAssignment). The receiver accepts incoming
  streams on the handler registered at transport startup.

  **Peer registry (client-local).** The client maintains a local peer registry that maps
  `peer_pubkey → { peer_id, multiaddrs, connected: bool }`. This registry is populated by
  `cello_connect_peer` (MCP-001), which dials the peer's multiaddr, extracts the remote
  Peer ID from libp2p's identify exchange, and stores the triple. Subsequent
  `cello_send({ peer_pubkey })` calls consult this registry to resolve the `peer_pubkey`
  to the `(peer_id, multiaddrs)` pair the transport layer needs. M0 does not persist the
  registry across restarts.

  Authorship is the only property M0 proves at the message layer — "I signed these bytes
  as the holder of K_local." There is no ordering guarantee across multiple messages
  (M1 introduces canonical sequencing via the relay). A peer may receive multiple messages
  from the same sender in any order; M0 does not detect reordering.

  Trust model: the receiver trusts a message iff the Ed25519 signature verifies against the
  claimed `sender_pubkey`. M0 has no identity registry, so `sender_pubkey` is a raw key —
  agent identity tied to real-world trust arrives with M3 (Connections & Policy). For M0
  the test harness pre-shares pubkeys between peers.

# ─── Behavior (EARS) ───────────────────────────────────────
behavior:
  - trigger: "When the client is asked to send a message to a peer identified by `peer_pubkey`"
    action: >
      the client shall (a) look up `peer_pubkey` in the local peer registry to resolve
      `(peer_id, multiaddrs)`, returning `{delivered: false, reason: 'peer_not_connected'}`
      if no registry entry exists, (b) ensure a libp2p connection to the peer exists,
      dialing the first multiaddr if none is open, (c) construct a MessageEnvelope v0 per
      MSG-001 using `keyProvider.sign` (CRYPTO-001); on `content_too_large` from the
      envelope constructor, return `{delivered: false, reason: 'content_too_large'}`
      without opening a stream, (d) open a new stream on `/cello/m0/1.0.0`, (e) write the
      canonical-CBOR encoding of the envelope as a single `it-length-prefixed` frame, (f)
      close the write side of the stream, (g) await the read-side close: a clean EOF
      returns `{delivered: true, content_hash: hex}`; a stream reset returns
      `{delivered: false, reason: 'remote_rejected'}`; a connection drop returns
      `{delivered: false, reason: 'connection_lost'}`.
  - trigger: "When the client's registered `/cello/m0/1.0.0` stream handler is invoked by libp2p with an inbound stream"
    action: >
      the handler shall (a) read a single `it-length-prefixed` frame (with a read timeout
      of 5 seconds — a frame that does not arrive within the timeout is treated as a
      truncated-frame rejection), (b) parse the CBOR into a MessageEnvelope v0 via
      protocol-types, (c) run full envelope validation per MSG-001 (field lengths,
      content_hash matches content, signature verifies against sender_pubkey), (d) on full
      success: enqueue the message on the client's receive queue keyed by `sender_pubkey`
      AND close the stream cleanly (no ACK frame is sent — the clean close IS the ACK
      signal), (e) on any validation failure or truncated-frame timeout: reset the stream
      (libp2p abort) and log a structured event identifying the failure class.
  - trigger: "When a received envelope's content_hash does not match `SHA-256(0x00 || content)`"
    action: "the client shall reject the envelope with a `content_hash_mismatch` event; the envelope is not delivered to the agent; the stream is reset."
  - trigger: "When a received envelope's signature does not verify against `sender_pubkey`"
    action: "the client shall reject the envelope with a `signature_verification_failed` event; the envelope is not delivered; the stream is reset."
  - trigger: "When a received envelope's CBOR fails to parse or fails structural validation"
    action: "the client shall reject with a `malformed_envelope` event carrying the specific validation error (missing field, wrong length, unsupported version, content too large); the stream is reset."
  - trigger: "When a send is attempted to a peer whose multiaddr cannot be dialed"
    action: "the client shall return `{delivered: false, reason: 'peer_unreachable'}` to the caller after libp2p reports dial failure."
  - trigger: "When a send successfully writes the envelope and closes the write side but the stream is then reset by the remote"
    action: "the client shall return `{delivered: false, reason: 'remote_rejected'}`. The remote reset indicates envelope validation failed on the receiver — the sender cannot tell which validation class failed, only that the receiver refused the message."
  - trigger: "When multiple sends are issued concurrently to the same peer"
    action: "each send opens its own stream over the shared libp2p connection (Yamux multiplexes). There is no per-peer serialization — M0 has no sequence numbers to preserve. Order of delivery at the receiver is unspecified."

# ─── Acceptance Criteria ────────────────────────────────────
acceptance_criteria:
  - id: AC-001
    given: "Two M0 clients A and B with libp2p nodes started; A knows B's Peer ID and listen multiaddr"
    when: "A sends the message `hello` to B"
    then: >
      B's receive queue contains one envelope whose content equals `hello`, whose
      `sender_pubkey` equals A's K_local pubkey, whose signature verifies, and whose
      `content_hash` matches `SHA-256(0x00 || 'hello')`. A's send call returns
      `{delivered: true}`
    test_type: integration
    component_under_test: client

  - id: AC-002
    given: "Two connected M0 clients A and B"
    when: "A sends 10 distinct messages to B as fast as send allows"
    then: "B receives all 10 envelopes; every signature verifies; every content_hash matches; no envelope is lost. Order of arrival is not asserted"
    test_type: integration
    component_under_test: client

  - id: AC-003
    given: "Two connected M0 clients A and B; the test harness intercepts A's outbound CBOR and flips one bit in the `content` field before it reaches B"
    when: "B's handler processes the inbound envelope"
    then: >
      The envelope is rejected with `content_hash_mismatch`; the envelope is NOT delivered
      to B's agent; the stream is reset; A's send call returns `{delivered: false,
      reason: 'remote_rejected'}`
    test_type: integration
    component_under_test: client

  - id: AC-004
    given: "Two connected M0 clients A and B; the test harness intercepts A's outbound CBOR and replaces the `sender_signature` field with 64 random bytes"
    when: "B's handler processes the inbound envelope"
    then: "The envelope is rejected with `signature_verification_failed`; the envelope is NOT delivered; the stream is reset"
    test_type: integration
    component_under_test: client

  - id: AC-005
    given: "Two connected M0 clients A and B; the test harness sends a raw non-CBOR payload (random bytes) on `/cello/m0/1.0.0`"
    when: "B's handler attempts to parse"
    then: "The handler rejects with `malformed_envelope`; the stream is reset; B's client remains healthy and accepts subsequent well-formed messages"
    test_type: integration
    component_under_test: client

  - id: AC-006
    given: "An M0 client A with a started libp2p node"
    when: "A attempts to send to a multiaddr that is not listening (no peer at that address)"
    then: "A's send call returns `{delivered: false, reason: 'peer_unreachable'}` within the libp2p dial timeout; A's node remains healthy"
    test_type: integration
    component_under_test: client

  - id: AC-007
    given: "Two connected M0 clients A and B; A sends a 1 MiB message (the upper bound)"
    when: "B's handler processes the envelope"
    then: "The envelope is delivered to B's receive queue; content_hash matches; signature verifies; no truncation"
    test_type: integration
    component_under_test: client

  - id: AC-008
    given: "Two connected M0 clients A and B; B's handler is in the middle of processing one stream when A opens a second stream on `/cello/m0/1.0.0`"
    when: "The second stream completes"
    then: "Both messages arrive in B's receive queue independently; stream handling is concurrent via Yamux multiplexing; neither stream blocks the other"
    test_type: integration
    component_under_test: client

  - id: AC-009
    given: "Two M0 clients A and B; A sends a message to B; B's receive queue is then drained by the agent via MCP-001's `cello_receive`"
    when: "The agent calls `cello_receive(timeout=1s)` on B"
    then: "The call returns the envelope's content, A's pubkey, and the content_hash within 1 second"
    test_type: e2e
    component_under_test: client

  - id: AC-010
    given: "Three M0 clients A, B, C all connected to each other; A sends messages to B and C concurrently"
    when: "The sends complete"
    then: "B receives A's message-to-B; C receives A's message-to-C; neither B nor C receives the other's message (per-peer routing is correct by libp2p Peer ID)"
    test_type: integration
    component_under_test: client

  - id: AC-011
    given: "Two connected M0 clients A and B; the test harness intercepts A's outbound CBOR payload after the length prefix has been written and flips one byte inside the CBOR payload (not the length prefix, which would be a framing-layer corruption covered by AC-012)"
    when: "B's handler processes the inbound frame"
    then: >
      B parses the CBOR successfully (the CBOR is structurally valid — a byte-flip in a
      random position inside the encoded envelope may land in the content field or any
      other byte; in this AC the test harness deterministically targets a byte inside the
      `content` field). Validation detects the content_hash mismatch; the handler resets
      the stream; A's send returns `{delivered: false, reason: 'remote_rejected'}`; B's
      receive queue is unchanged. This AC exercises the same guarantee as AC-003 but at
      the CBOR-payload layer rather than logical-content layer, ensuring middle-of-frame
      tampering is detectable regardless of which byte was flipped
    test_type: integration
    component_under_test: client

  - id: AC-012
    given: "Two connected M0 clients A and B; the test harness opens a raw libp2p stream on `/cello/m0/1.0.0` to B and writes only a length prefix that claims 100 bytes of payload, then writes only 20 bytes, then closes the write side"
    when: "B's handler processes the inbound stream"
    then: >
      The handler's read-with-timeout (5 seconds) times out waiting for the remaining 80
      bytes; the handler rejects with `malformed_envelope` (subreason: `truncated_frame`)
      and resets the stream; B's client remains healthy and accepts subsequent well-formed
      streams. The handler does NOT block indefinitely
    test_type: integration
    component_under_test: client

  - id: AC-013
    given: "An M0 client A with a started libp2p node and an established connection to B"
    when: "A calls send with content of 1,048,577 bytes (1 MiB + 1 — exceeds the MSG-001 cap)"
    then: "A's send call returns `{delivered: false, reason: 'content_too_large'}` before any libp2p stream is opened; A's node remains healthy; no outbound bytes are written"
    test_type: integration
    component_under_test: client

  - id: AC-014
    given: "Two connected M0 clients A and B; A sends an envelope to B with valid content, a valid signature, but a `content_hash` field that was computed as `SHA-256(0x01 || content)` (with the internal-node prefix, not the message-leaf prefix) — this is TG-002 from the review"
    when: "B's handler processes the inbound envelope"
    then: >
      B recomputes content_hash as `SHA-256(0x00 || content)` via the CRYPTO-002
      message-leaf primitive, finds it does not match the envelope's (wrong-prefix)
      content_hash field, rejects with `content_hash_mismatch`, and resets the stream. The
      handler MUST NOT accept the envelope solely because the signature over the (wrong)
      content_hash verifies — the recompute step is independent of signature verification
      and catches wrong-prefix hashes before trust is extended
    test_type: integration
    component_under_test: client

# ─── Security Invariants ───────────────────────────────────
security_invariants:
  - id: SI-001
    statement: >
      The client shall never deliver an inbound envelope to the agent without first verifying
      both the content_hash (recomputed from the envelope's content field) and the Ed25519
      signature (verified against the envelope's sender_pubkey over canonical-CBOR(TBS)).
    adversarial_condition: >
      even when libp2p's Noise layer authenticated the transport — Noise proves the packet
      came from the remote Peer ID, not that the envelope's claimed sender_pubkey signed
      this content. The two properties are independent; both must pass.
    test_type: integration
    component_under_test: client

  - id: SI-002
    statement: >
      The client shall never emit an outbound envelope whose content_hash was not computed
      from the content field by the envelope constructor. MSG-001 SI-001 carries forward to
      the client layer — the client must not bypass the constructor or supply a
      pre-computed content_hash.
    adversarial_condition: >
      even when a test fixture supplies a pre-computed content_hash through a shortcut API
      the module must not expose — the client's send path invokes the constructor with only
      the content and the `KeyProvider`; the constructor computes the hash via CRYPTO-002's
      message-leaf primitive and signs via `keyProvider.sign`.
    test_type: unit
    component_under_test: client

  - id: SI-003
    statement: >
      The client shall never accept a libp2p stream on `/cello/m0/1.0.0` without running
      the full validation pipeline: CBOR parse → structural validation → content_hash
      recompute → signature verification. Short-circuiting any step (e.g., skipping hash
      recompute when the signature verifies) is a protocol violation.
    adversarial_condition: >
      even when performance pressure might motivate caching or reordering — the validation
      pipeline is fixed. A message with a valid signature over content_hash X and a content
      field whose actual hash is Y ≠ X must be rejected at the content_hash check, not
      accepted because the signature "verified."
    test_type: integration
    component_under_test: client

# ─── Degraded Behavior ─────────────────────────────────────
degraded_behavior:
  - id: DB-001
    condition: "While the local libp2p node is not started"
    fallback: >
      the client shall reject send and receive-handler registration with a structured
      `transport_not_started` error. No queuing occurs; the caller must start the transport
      before exchanging messages. The client does not auto-start the transport on first send.
    test_type: unit
    component_under_test: client

  - id: DB-002
    condition: "While a libp2p connection to a specific peer has dropped mid-send (after stream open, before write completes)"
    fallback: >
      the send call returns `{delivered: false, reason: 'connection_lost'}`. The envelope
      is not retried — M0 has no retry semantics. The caller decides whether to retry by
      redialing.
    test_type: integration
    component_under_test: client

