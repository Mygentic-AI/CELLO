# ─── Identity ───────────────────────────────────────────────
id: CELLO-SESSION-001
domain: Session Lifecycle
actor: CLIENT
priority: P0
components:
  - client
  - directory

# ─── Intent ─────────────────────────────────────────────────
story: >
  As the CELLO Client,
  I want to establish a conversation session with another agent through the directory and close it cleanly
  so that messages are scoped to a session with a defined start and end.

# ─── Behavior (EARS) ───────────────────────────────────────
behavior:
  - trigger: "When the client requests a new session with a target agent"
    action: "the client shall send a session establishment request to the directory containing the initiator's public key and the target's public key; the directory shall generate a unique session_id, register both parties, and return the session_id to both clients"
  - trigger: "When a client receives a session establishment response"
    action: "the client shall store the session_id, counterparty public key, and initialize the sequence counter to 0"
  - trigger: "When the client requests session close"
    action: "the client shall send a CLOSE message to the counterparty through the directory; the counterparty shall respond with CLOSE-ACK; both clients mark the session as closed"
  - trigger: "When the client receives a CLOSE message"
    action: "the client shall respond with CLOSE-ACK and mark the session as closed"
  - trigger: "When no CLOSE-ACK is received within the configured timeout"
    action: "the client shall mark the session as closed unilaterally and log the timeout"

# ─── Acceptance Criteria ────────────────────────────────────
acceptance_criteria:
  - id: AC-001
    given: "Two clients connected to the directory"
    when: "Client A requests a session with Client B"
    then: "Both clients receive the same session_id; both have each other's public key recorded"
    test_type: integration
    component_under_test: client

  - id: AC-002
    given: "An active session between Client A and Client B"
    when: "Client A sends a CLOSE"
    then: "Client B receives the CLOSE, responds with CLOSE-ACK, and both clients' session status is 'closed'"
    test_type: integration
    component_under_test: client

  - id: AC-003
    given: "An active session"
    when: "Client A sends CLOSE and Client B does not respond within timeout"
    then: "Client A marks the session as closed with status 'closed-unilateral'"
    test_type: integration
    component_under_test: client

  - id: AC-004
    given: "A closed session"
    when: "Client A attempts to send a message on the closed session_id"
    then: "The client rejects the send with a structured error indicating the session is closed"
    test_type: unit
    component_under_test: client

  - id: AC-005
    given: "Client A is connected to the directory"
    when: "Client A requests a session with a public key that is not connected"
    then: "The directory returns a structured error indicating the target is not available"
    test_type: integration
    component_under_test: directory

  - id: AC-006
    given: "Client A has two active sessions (with B and C)"
    when: "Client A lists active sessions"
    then: "Both sessions are returned with correct counterparty public keys and status 'active'"
    test_type: integration
    component_under_test: client

# ─── Security Invariants ───────────────────────────────────
security_invariants:
  - id: SI-001
    statement: "The directory shall never create a session where one of the parties did not request or accept it"
    adversarial_condition: "even when an attacker sends a forged session establishment request with another client's public key"
    test_type: integration
    component_under_test: directory

# ─── References ─────────────────────────────────────────────
references:
  protocol_map: "Conversations"
  end_to_end_flow: "§3.1, §6.7"
  discussion_logs:
    - "2026-04-08_1530_message-delivery-and-termination"
    - "2026-04-15_0900_session-level-frost-signing"
