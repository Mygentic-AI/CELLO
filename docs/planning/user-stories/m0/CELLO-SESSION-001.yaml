# ─── Identity ───────────────────────────────────────────────
id: CELLO-SESSION-001
domain: Session Lifecycle
actor: CLIENT
priority: P0
components:
  - client
  - directory

# ─── Intent ─────────────────────────────────────────────────
story: >
  As the CELLO Client,
  I want to establish a conversation session with another agent through the directory and close it cleanly
  so that messages are scoped to a session with a defined start and end.

# ─── Behavior (EARS) ───────────────────────────────────────
behavior:
  - trigger: "When the client requests a new session with a target agent"
    action: >
      the client shall send a session establishment request to the directory containing the
      initiator's public key and the target's public key. The directory shall generate a
      unique session_id, register both parties, push a `session_established` event
      `{session_id, initiator_pubkey}` to the target client's authenticated WebSocket, and
      return the session_id to the initiator.
  - trigger: "When the initiator receives the session establishment response"
    action: "the client shall store the session_id, counterparty public key, and initialize the sequence counter to 0"
  - trigger: "When the target client receives a `session_established` event"
    action: >
      the client shall record the session_id, the initiator's public key, and initialize
      the sequence counter to 0, making the session visible in its active session list and
      discoverable to the agent via `cello_await_session`.
  - trigger: "When the client requests session close"
    action: "the client shall send a CLOSE message to the counterparty through the directory; the counterparty shall respond with CLOSE-ACK; both clients mark the session as closed"
  - trigger: "When the client receives a CLOSE message"
    action: "the client shall respond with CLOSE-ACK and mark the session as closed"
  - trigger: "When no CLOSE-ACK is received within the configured timeout"
    action: "the client shall mark the session as closed unilaterally and log the timeout"

# ─── Acceptance Criteria ────────────────────────────────────
acceptance_criteria:
  - id: AC-001
    given: "Two clients connected to the directory"
    when: "Client A requests a session with Client B"
    then: "Both clients receive the same session_id; both have each other's public key recorded"
    test_type: integration
    component_under_test: client

  - id: AC-002
    given: "An active session between Client A and Client B"
    when: "Client A sends a CLOSE"
    then: "Client B receives the CLOSE, responds with CLOSE-ACK, and both clients' session status is 'closed'"
    test_type: integration
    component_under_test: client

  - id: AC-003
    given: "An active session"
    when: "Client A sends CLOSE and Client B does not respond within timeout"
    then: "Client A marks the session as closed with status 'closed-unilateral'"
    test_type: integration
    component_under_test: client

  - id: AC-004
    given: "A closed session"
    when: "Client A attempts to send a message on the closed session_id"
    then: "The client rejects the send with a structured error indicating the session is closed"
    test_type: unit
    component_under_test: client

  - id: AC-005
    given: "Client A is connected to the directory"
    when: "Client A requests a session with a public key that is not connected"
    then: "The directory returns a structured error indicating the target is not available"
    test_type: integration
    component_under_test: directory

  - id: AC-006
    given: "Client A has two active sessions (with B and C)"
    when: "Client A lists active sessions"
    then: "Both sessions are returned with correct counterparty public keys and status 'active'"
    test_type: integration
    component_under_test: client

  - id: AC-007
    given: "Client B is authenticated to the directory"
    when: "Client A initiates a session targeting Client B's pubkey"
    then: "Before any message is exchanged, Client B's runtime receives a `session_established` event and the session appears in Client B's active session list with Client A's pubkey as counterparty, status 'active', and sequence counter 0"
    test_type: integration
    component_under_test: client

  - id: AC-008
    given: "Client A is authenticated to the directory; no client is authenticated under target pubkey K_B"
    when: "Client A initiates a session targeting K_B"
    then: "The directory returns a structured `target_offline` error; no session is created; Client A's active session list is unchanged"
    test_type: integration
    component_under_test: directory

  - id: AC-009
    given: "A running directory"
    when: "1,000 sessions are created in rapid succession between authenticated client pairs"
    then: >
      All 1,000 session_ids are unique, all are exactly 16 bytes, and a chi-squared test
      on the concatenated session_id bytes against a uniform distribution yields p > 0.01
      (a sanity check that the ids came from a CSPRNG, not a low-entropy counter).
    test_type: integration
    component_under_test: directory

# ─── Security Invariants ───────────────────────────────────
security_invariants:
  - id: SI-001
    statement: >
      The directory shall create a session only when both parties are concurrently connected
      and authenticated under the pubkeys named in the session-initiate request. In M0
      there is no receiver-accept step — the target is notified via `session_established`
      — so "both parties authenticated at creation time" is the full M0 invariant.
      Receiver-gated acceptance is deferred to M3 (CELLO-CONNREQ-*).
    adversarial_condition: >
      even when an attacker initiates a session toward a pubkey that is offline, was
      recently online but currently disconnected, or is represented by a hung WebSocket
      that has not completed the challenge-response handshake.
    test_type: integration
    component_under_test: directory

  - id: SI-002
    statement: >
      The directory shall generate session_ids as 16 bytes (128 bits) read from a
      cryptographically secure random source, and shall never issue a session_id that
      collides with an existing active or recently-closed session.
    adversarial_condition: >
      even when an attacker authenticated as K_X attempts to probe NODE-001's SI-003
      (relay to non-participant) by guessing session_ids; 128 bits of entropy from a
      CSPRNG makes brute-force infeasible. Also: even when 1000 sessions are created in
      rapid succession, no two collide.
    test_type: integration
    component_under_test: directory

# ─── Degraded Behavior ─────────────────────────────────────
degraded_behavior:
  - id: DB-001
    condition: "While the directory WebSocket is disconnected mid-session"
    fallback: >
      the client shall mark the affected sessions as `transport_lost`, surface the event
      to the agent on the next MCP call referencing those sessions, and reject further
      send/close operations on them with a `transport_unavailable` error rather than
      blocking. Session resumption after reconnect is out of M0 scope — the agent must
      treat a `transport_lost` session as effectively closed.
    test_type: integration
    component_under_test: client

# ─── References ─────────────────────────────────────────────
references:
