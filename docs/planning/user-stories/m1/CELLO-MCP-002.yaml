# ─── Identity ───────────────────────────────────────────────
id: CELLO-MCP-002
domain: MCP Tool Surface
actor: AGENT
priority: P0
components:
  - client

# ─── Intent ─────────────────────────────────────────────────
story: >
  As an AI Agent,
  I want the MCP surface extended in M1 so that (a) `cello_close_session` returns the sealed_root, (b) a new `cello_get_sealed_receipt` tool surfaces the full seal record, and (c) a new `cello_get_inclusion_proof` tool returns an RFC 6962 inclusion proof for any leaf in a sealed session
  so that an agent can prove conversation contents to a third party and verify that a message it remembers sending is actually in the sealed tree.

  M1 extends MCP-001 rather than replacing it. The existing tools keep their schemas with three
  modifications required by M1 semantics:

  - `cello_initiate_session` response keeps its shape but is now populated by SESSION-002 —
    the session_id is allocated by the directory, and the relay_endpoint returned in the
    response is the relay the directory assigned.
  - `cello_send` response keeps `{delivered: bool, leaf_hash: hex}` but `leaf_hash` now refers
    to Structure 2's leaf_hash (MERKLE-002) instead of M0's envelope-level hash.
  - `cello_close_session` response is enriched: in M1 it returns
    `{status: "sealed" | "seal_deferred" | "seal_rejected", sealed_root: hex | null, close_timestamp: int, reason: string | null}`.
    For `seal_rejected`, `reason` carries the directory's structured rejection code.

  Two new tools are added:

  - `cello_get_sealed_receipt(session_id)` — returns the seal record held locally by the client
    after the directory confirmed the seal:
    `{session_id: hex, sealed_root: hex, participants: [hex, hex], close_timestamp: int,
       attestation_self: "PENDING", attestation_counterparty: "PENDING",
       leaf_count: int}`. Attestation fields are `PENDING` in M1 per the roadmap's deferred-items
    policy (CLEAN/FLAGGED land in M7).

  - `cello_get_inclusion_proof(session_id, leaf_index)` — returns an RFC 6962 inclusion proof
    against the sealed_root:
    `{leaf_hash: hex, leaf_index: int, tree_size: int, proof: [hex, ...], sealed_root: hex}`.
    The agent (or any third party the agent shares the proof with) can verify the proof using
    any RFC 6962 verifier — no CELLO-specific knowledge needed beyond knowing the sealed_root.
    The client answers from its local tree copy; no round-trip to the directory or relay. For
    unsealed sessions this tool returns a structured error — inclusion proofs in M1 are sealed-only.

  Binary encoding across the MCP JSON boundary is unchanged from MCP-001: lowercase hex, no
  `0x` prefix, for all pubkeys, hashes, signatures, session_ids, sealed_roots, and proof hashes.

  Transport selection (stdio in prod, SDK InMemoryTransport in tests) and the shared factory
  pattern are unchanged from MCP-001 AC-008.

# ─── Behavior (EARS) ───────────────────────────────────────
behavior:
  - trigger: "When the agent calls cello_close_session on an active session"
    action: >
      the MCP server shall invoke SESSION-003's bilateral seal flow and wait for one of:
      (a) `session_sealed` event from the directory → return
      `{status: \"sealed\", sealed_root, close_timestamp, reason: null}`,
      (b) `session_seal_rejected` from the directory → return
      `{status: \"seal_rejected\", sealed_root: null, close_timestamp, reason}`,
      (c) directory unreachable → return
      `{status: \"seal_deferred\", sealed_root: null, close_timestamp, reason: \"directory_unreachable\"}`.
  - trigger: "When the agent calls cello_get_sealed_receipt with a session_id"
    action: >
      the MCP server shall look up the local seal record. If present, return the SealedReceipt
      structure with attestation fields carrying `PENDING`. If the session is not sealed or
      not known, return a structured error
      `{reason: \"session_not_sealed\" | \"session_not_found\", session_id}`.
  - trigger: "When the agent calls cello_get_inclusion_proof with (session_id, leaf_index)"
    action: >
      the MCP server shall (a) look up the session; if not sealed, return
      `{reason: \"session_not_sealed\"}`, (b) validate leaf_index is in range [0, tree_size);
      if not, return `{reason: \"leaf_index_out_of_range\", leaf_index, tree_size}`, (c) compute
      the RFC 6962 inclusion proof from the local tree via MERKLE-001, (d) return the proof
      structure with all hashes encoded as lowercase hex.
  - trigger: "When any new tool is called during an active (unsealed) session"
    action: "the MCP server shall return the appropriate structured error per the trigger rules above; no state is modified."
  - trigger: "When the server factory is invoked with a transport argument"
    action: "the factory shall register the M1 tool set identically under stdio and InMemoryTransport (MCP-001 AC-008 extended to cover the two new tools)."

# ─── Acceptance Criteria ────────────────────────────────────
acceptance_criteria:
  - id: AC-001
    given: "Two MCP server instances connected to the directory+relay with an active 5-message session between Agent A and Agent B"
    when: "Agent A calls cello_close_session"
    then: >
      After SESSION-003's bilateral seal flow completes, Agent A's cello_close_session returns
      `{status: \"sealed\", sealed_root: <hex>, close_timestamp: <int>, reason: null}` with
      sealed_root equal to the directory's recorded sealed_root
    test_type: e2e
    component_under_test: client

  - id: AC-002
    given: "A sealed session on Agent A's client"
    when: "Agent A calls cello_get_sealed_receipt(session_id)"
    then: >
      The response is `{session_id, sealed_root, participants: [A_pubkey_hex,
      B_pubkey_hex], close_timestamp, attestation_self: \"PENDING\",
      attestation_counterparty: \"PENDING\", leaf_count: 7}` (5 messages + 2 SEAL leaves)
    test_type: e2e
    component_under_test: client

  - id: AC-003
    given: "A sealed session with 7 leaves on Agent A's client"
    when: "Agent A calls cello_get_inclusion_proof(session_id, leaf_index=3)"
    then: >
      The response contains leaf_hash (hex), leaf_index=3, tree_size=7, proof (list of hex
      siblings), and sealed_root (hex); verifying the proof against sealed_root using
      MERKLE-001's verifier returns true
    test_type: e2e
    component_under_test: client

  - id: AC-004
    given: "A sealed session and the inclusion proof from AC-003"
    when: "The test harness feeds the proof into an independent RFC 6962 verifier (e.g., a Python reference implementation) against the same sealed_root and leaf_hash"
    then: "The independent verifier also returns true, confirming the proof is format-compliant with RFC 6962 (not CELLO-specific)"
    test_type: e2e
    component_under_test: client

  - id: AC-005
    given: "An active (unsealed) session"
    when: "Agent A calls cello_get_sealed_receipt(session_id)"
    then: "The response is `{error: {reason: \"session_not_sealed\", session_id}}`"
    test_type: unit
    component_under_test: client

  - id: AC-006
    given: "An active (unsealed) session"
    when: "Agent A calls cello_get_inclusion_proof(session_id, leaf_index=0)"
    then: "The response is `{error: {reason: \"session_not_sealed\", session_id}}`"
    test_type: unit
    component_under_test: client

  - id: AC-007
    given: "A sealed session with 7 leaves"
    when: "Agent A calls cello_get_inclusion_proof(session_id, leaf_index=7)"
    then: "The response is `{error: {reason: \"leaf_index_out_of_range\", leaf_index: 7, tree_size: 7}}`"
    test_type: unit
    component_under_test: client

  - id: AC-008
    given: "The MCP server factory"
    when: "The factory is invoked once with SDK InMemoryTransport and once with stdio transport"
    then: >
      Both invocations register the M0 tools plus the M1 additions (cello_get_sealed_receipt,
      cello_get_inclusion_proof) with identical input/output schemas; cello_close_session's
      M1 output schema is registered identically in both; MCP-001 AC-008's structural-equality
      assertion continues to pass
    test_type: unit
    component_under_test: client

  - id: AC-009
    given: "A sealed session on Agent A's client and Agent A has copied the sealed_root + proof for leaf_index=2 to an independent verifier that does not have the session's leaf sequence"
    when: "The verifier reconstructs the root from (leaf_hash, proof) and compares against sealed_root"
    then: "Reconstruction succeeds and equals sealed_root; the verifier confirms the leaf's inclusion without needing any other leaves"
    test_type: e2e
    component_under_test: client

  - id: AC-010
    given: "A session where A has called cello_close_session but the directory is unreachable"
    when: "cello_close_session returns"
    then: >
      The response is `{status: \"seal_deferred\", sealed_root: null, close_timestamp,
      reason: \"directory_unreachable\"}`; subsequent calls to cello_get_sealed_receipt
      return `{error: {reason: \"session_not_sealed\"}}` until the directory confirms the seal
    test_type: integration
    component_under_test: client

# ─── Security Invariants ───────────────────────────────────
security_invariants:
  - id: SI-001
    statement: >
      The MCP server shall never return a sealed_root or inclusion proof for a session whose
      seal was rejected by the directory.
    adversarial_condition: >
      even when the client holds the leaf sequence locally — a seal_rejected session has no
      valid sealed_root, and exposing one would undermine the "receipt only after directory
      confirmation" contract.
    test_type: integration
    component_under_test: client

  - id: SI-002
    statement: >
      The MCP server shall never emit K_local private key material through any tool response
      (MCP-001 SI-001 carried forward to cover the new tools).
    adversarial_condition: >
      even when cello_get_sealed_receipt or cello_get_inclusion_proof error paths include
      diagnostic information.
    test_type: unit
    component_under_test: client

  - id: SI-003
    statement: >
      The MCP server shall never return an inclusion proof whose reconstructed root does not
      equal the sealed_root returned by the same call (self-consistency).
    adversarial_condition: >
      even when the local tree is mid-update or a race between seal and proof retrieval could
      otherwise expose a transient state — the tool reads a stable snapshot tied to the sealed
      tree.
    test_type: unit
    component_under_test: client

