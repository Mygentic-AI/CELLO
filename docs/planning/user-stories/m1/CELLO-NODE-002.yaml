# ─── Identity ───────────────────────────────────────────────
id: CELLO-NODE-002
domain: Node Operations
actor: DIR
priority: P0
components:
  - relay

# ─── Intent ─────────────────────────────────────────────────
story: >
  As the Relay Node,
  I want to accept sender-signed Structure 1 leaves, assign canonical sequence numbers, compute `prev_root`, construct Structure 2, and maintain the per-session Merkle tree during the active session
  so that the per-session Merkle state is authoritative during the session and the tree is internally
  consistent when handed to the directory at seal.

  M1 introduces `packages/relay` as a distinct package with its own store interface
  (`RelayStore` with `InMemoryRelayStore` as the initial implementation). In the Vitest test
  harness the relay runs in-process alongside the directory and clients; the boundary is
  enforced by the client never importing from `packages/relay` (it imports only from
  `protocol-types` and `crypto`) and the relay never reading client internals.

  In M1 the relay learns about sessions through a trusted in-process call from the directory at
  session establishment (see SESSION-002) — relay/directory authentication as a network protocol
  is a later-milestone concern. The relay exposes a WebSocket endpoint to clients for hash
  submission and Structure 2 delivery. Client-to-relay authentication reuses the Ed25519
  challenge-response from NODE-001 (same byte-string construction, with the domain prefix
  `"CELLO-RELAY-AUTH-v1"` instead of `"CELLO-WS-AUTH-v1"` so a signature for one endpoint
  cannot be replayed at the other).

  The relay does NOT see message content. It sees Structure 1 (which contains only content_hash,
  not content). Message content flows directly between participants (in M1: over the same
  relay WebSocket but via a separate `content_deliver` frame routed to the counterparty without
  being inspected, hashed, or stored by the relay). This satisfies the "hash relay, not content
  relay" invariant (protocol-map Invariant 1).

# ─── Behavior (EARS) ───────────────────────────────────────
behavior:
  - trigger: "When a client opens a WebSocket connection to the relay"
    action: >
      the relay shall issue a `relay_auth_challenge` frame `{nonce}` (32 bytes, CSPRNG, 30s TTL,
      single-use) and hold the connection unauthenticated until the challenge resolves, reusing
      NODE-001's auth state machine with the domain string `"CELLO-RELAY-AUTH-v1"`.
  - trigger: "When a directory supplies a session assignment to the relay in-process"
    action: >
      the relay shall record the session: session_id (16 bytes), participant pubkeys (A, B),
      the directory's signed assignment record, and the genesis prev_root per SESSION-002. It
      initialises the per-session leaf log (empty) and the canonical sequence counter to 0.
  - trigger: "When an authenticated client submits a signed Structure 1 for an active session"
    action: >
      The client submits a `hash_submit` frame carrying `{session_id, leaf_kind, structure1_cbor,
      sender_signature}` where `leaf_kind` is a frame-level `uint8` — `0x00` for message leaves
      or `0x02` for control leaves — applied later as the Merkle leaf-hash prefix byte per
      MERKLE-002. On receipt the relay shall (a) verify the client is a registered participant
      of the session, (b) reject with `leaf_kind_invalid` if leaf_kind is any value other than
      `0x00` or `0x02`, (c) verify the sender's Ed25519 signature over canonical-CBOR(Structure 1),
      (d) verify the declared `last_seen_seq` is <= the current canonical sequence counter (a
      client cannot commit to having seen a future sequence number), (e) assign the next canonical
      sequence number, (f) compute prev_root as the Merkle root of the per-session tree over all
      prior leaves (for the first leaf, use the genesis prev_root from the session assignment),
      (g) construct the 6-element Structure 2 per MERKLE-002 with the M1 scan_result sentinel,
      (h) compute the new leaf hash as `SHA-256(leaf_kind || canonical_CBOR(Structure 2))`,
      append to the tree, and (i) relay Structure 2 plus the same `leaf_kind` frame-level field
      to the counterparty's WebSocket.
  - trigger: "When an authenticated client submits a Structure 1 whose sender_pubkey does not match the connection's authenticated pubkey"
    action: "the relay shall reject the submission with a structured `sender_mismatch` error and shall not assign a sequence number or append to the tree."
  - trigger: "When an authenticated client submits a Structure 1 for a session_id it is not a participant of"
    action: "the relay shall reject with a structured `not_a_participant` error, shall not relay, and shall not reveal whether the session exists."
  - trigger: "When a client submits a Structure 1 with last_seen_seq > current canonical sequence counter"
    action: "the relay shall reject with a structured `last_seen_seq_ahead` error — the client has declared seeing a sequence the relay has not yet issued."
  - trigger: "When a client submits a content_deliver frame `{session_id, counterparty_pubkey, content_bytes}` alongside a Structure 1"
    action: >
      the relay shall forward the content_bytes verbatim to the counterparty's WebSocket as an
      out-of-band payload keyed to the same session_id and sequence_number assigned to the
      corresponding Structure 1. The relay shall not inspect, hash, store, or log content_bytes.
      This is a pragmatic M1 simplification — M10 moves content to libp2p; M1 colocates the
      content channel with the hash channel in-process so the dual-path cross-check (MSG-004)
      can be exercised without standing up libp2p. The invariant "relay never stores content"
      is preserved: content_bytes is a transient WebSocket payload, never persisted to
      RelayStore.
  - trigger: "When the directory requests the session's leaf sequence and final root for the seal"
    action: >
      the relay shall return the complete ordered list of Structure 2 leaves and the current
      Merkle root, and shall mark the session `sealing`. After the directory confirms the seal,
      the relay shall destroy the per-session state (leaf log, tree nodes, counters). Per-session
      state is ephemeral by design; no post-seal retention.
  - trigger: "When a participant disconnects during an active session"
    action: >
      the relay shall not destroy the session state (the participant may reconnect). On reconnect
      with a fresh auth handshake, the participant resumes from the current canonical sequence
      counter; the relay replays any Structure 2 leaves missed during the disconnect.

# ─── Acceptance Criteria ────────────────────────────────────
acceptance_criteria:
  - id: AC-001
    given: "A relay in-process with an established session between authenticated clients A and B (genesis prev_root = G)"
    when: "A submits a signed Structure 1 with content_hash = H1, last_seen_seq = 0"
    then: "The relay assigns sequence_number = 1, sets prev_root = G in Structure 2, relays Structure 2 to B, and appends the leaf to the tree"
    test_type: integration
    component_under_test: relay

  - id: AC-002
    given: "An active session where A has already sent two messages (sequence numbers 1 and 2)"
    when: "A submits a signed Structure 1 with last_seen_seq = 2"
    then: "The relay assigns sequence_number = 3 and sets prev_root = Merkle root of the tree after leaves 1 and 2"
    test_type: integration
    component_under_test: relay

  - id: AC-003
    given: "An active session"
    when: "A submits a Structure 1 where sender_pubkey = K_X (K_X is not A's authenticated pubkey)"
    then: "The relay rejects with `sender_mismatch`; no sequence number is assigned; the tree is unchanged"
    test_type: integration
    component_under_test: relay

  - id: AC-004
    given: "An active session and a third authenticated client C who is not a participant"
    when: "C submits a Structure 1 for this session_id with a valid self-signature"
    then: "The relay rejects with `not_a_participant`; no sequence number is assigned; the tree is unchanged"
    test_type: integration
    component_under_test: relay

  - id: AC-005
    given: "An active session where the canonical sequence counter is currently 2"
    when: "A submits a Structure 1 declaring last_seen_seq = 5"
    then: "The relay rejects with `last_seen_seq_ahead`; no sequence number is assigned"
    test_type: integration
    component_under_test: relay

  - id: AC-006
    given: "An active session with 10 leaves appended"
    when: "The directory requests the seal handoff"
    then: "The relay returns all 10 Structure 2 leaves in order plus the current Merkle root; the root matches an independent recomputation from the returned leaf sequence"
    test_type: integration
    component_under_test: relay

  - id: AC-007
    given: "A session the relay has handed off to the directory for seal"
    when: "Another client submits a Structure 1 for that session_id after the seal completes"
    then: "The relay rejects with a structured `session_not_found` error; no per-session state exists"
    test_type: integration
    component_under_test: relay

  - id: AC-008
    given: "Two clients A and B in an active session over local WebSockets"
    when: "A submits Structure 1 plus a content_deliver frame with content_bytes = CB"
    then: "B's WebSocket receives Structure 2 AND the content_deliver payload keyed to the same sequence_number; the relay's log contains sequence_number but not CB"
    test_type: integration
    component_under_test: relay

  - id: AC-009
    given: "An authenticated client submits 50 Structure 1 frames in rapid succession on an active session"
    when: "The relay processes them"
    then: "Sequence numbers 1 through 50 are assigned in order; prev_root for leaf i equals the Merkle root of the tree after leaves 1..i-1; all 50 Structure 2 frames are relayed to the counterparty in submission order"
    test_type: integration
    component_under_test: relay

  - id: AC-010
    given: "A client authenticates to the relay with challenge signature computed over the domain string `\"CELLO-WS-AUTH-v1\"` (NODE-001's directory domain string) instead of `\"CELLO-RELAY-AUTH-v1\"`"
    when: "The relay verifies the challenge response"
    then: "The relay closes the connection with `auth_failed: wrong_domain` and does not register the client"
    test_type: integration
    component_under_test: relay

  - id: AC-011
    given: "An authenticated participant of an active session"
    when: "The participant submits a `hash_submit` frame whose `leaf_kind` field is `0x01`, `0x03`, or any other value outside `{0x00, 0x02}`"
    then: "The relay rejects with `leaf_kind_invalid`; no sequence number is assigned; the tree is unchanged; no Structure 2 is relayed to the counterparty"
    test_type: integration
    component_under_test: relay

# ─── Security Invariants ───────────────────────────────────
security_invariants:
  - id: SI-001
    statement: "The relay shall never store, log, or inspect the content field of a message; only Structure 1's content_hash and Structure 2's fields enter relay persistence."
    adversarial_condition: >
      even when a misconfigured logger would otherwise capture WebSocket payload bodies — content_deliver
      frames are routed without being read into any persistent or diagnostic path.
    test_type: integration
    component_under_test: relay

  - id: SI-002
    statement: "The relay shall never issue duplicate or non-monotonic canonical sequence numbers within a single session."
    adversarial_condition: >
      even when 100 Structure 1 submissions from both participants arrive concurrently — a
      per-session serialization queue ensures strictly monotonic assignment.
    test_type: integration
    component_under_test: relay

  - id: SI-003
    statement: >
      The relay shall never construct a Structure 2 whose embedded sender_signature (from the
      submitted Structure 1) does not verify against canonical-CBOR(Structure 1) under
      sender_pubkey.
    adversarial_condition: >
      even when a client submits a Structure 1 with a valid-looking but forged signature — the
      relay rejects at submission time.
    test_type: integration
    component_under_test: relay

  - id: SI-004
    statement: >
      The relay shall never relay a Structure 2 to a client that is not the counterparty of the
      session the submission originated from.
    adversarial_condition: >
      even when an attacker authenticated under K_X guesses a valid session_id and attempts to
      inject a Structure 1 into it; session_id guessability is addressed by SESSION-002's 128-bit
      CSPRNG session IDs.
    test_type: integration
    component_under_test: relay

  - id: SI-005
    statement: >
      The relay shall destroy all per-session Merkle state (leaf log, tree nodes, counters) after
      confirming the seal handoff to the directory. No sealed-session state persists in the relay.
    adversarial_condition: >
      even when a post-seal forensic query or a bug in the seal confirmation path could otherwise
      cause data to linger — the destruction is synchronous with seal confirmation.
    test_type: integration
    component_under_test: relay

# ─── Degraded Behavior ─────────────────────────────────────
degraded_behavior:
  - id: DB-001
    condition: "While a participant's WebSocket is disconnected during an active session"
    fallback: >
      the relay shall retain the per-session state (leaf log, tree, counter) and, on the
      participant's reconnect and successful re-authentication, replay Structure 2 leaves
      that were appended while they were disconnected. Full recovery semantics (new-relay
      assignment, directory notification) are out of M1 scope.
    test_type: integration
    component_under_test: relay

