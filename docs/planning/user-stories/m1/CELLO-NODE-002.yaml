# ─── Identity ───────────────────────────────────────────────
id: CELLO-NODE-002
domain: Node Operations
actor: DIR
priority: P0
components:
  - relay

# ─── Intent ─────────────────────────────────────────────────
story: >
  As the Relay Node,
  I want to accept sender-signed Structure 1 leaves over a dedicated libp2p protocol, assign canonical sequence numbers, compute `prev_root`, construct Structure 2, maintain the per-session Merkle tree, and deliver Structure 2 to the counterparty
  so that canonical sequencing is authoritative during an active session, the tree is internally consistent when handed to the directory at seal, and the relay has **no topological path to message content**.

  M1 introduces `packages/relay` as a distinct pnpm workspace package with its own store
  interface (`RelayStore` + `InMemoryRelayStore`). The client never imports from
  `packages/relay` — it reaches the relay over libp2p on the `/cello/relay/1.0.0` stream
  protocol. In-process Vitest co-location is a harness convenience; the package boundary is
  real.

  The relay is a libp2p node (TRANSPORT-001 infrastructure reused) separate from the directory
  libp2p node. It has its own Peer ID derived from a relay-identity Ed25519 keypair pinned in
  client and directory configuration. The relay registers a single inbound protocol:
  `/cello/relay/1.0.0`. It does NOT register `/cello/signaling/1.0.0` or `/cello/content/1.0.0`
  — the relay is not a signaler and is not a content peer.

  **Content isolation (architectural invariant):** the relay never handles message content.
  There is no `content_deliver` frame, no content field anywhere in any frame the relay
  accepts, and no protocol path by which content reaches the relay. Content flows peer↔peer
  on `/cello/content/1.0.0` (MSG-004) between the two session participants. The relay sees
  only the 32-byte `content_hash` embedded inside Structure 1. This is enforced at the
  protocol-registration level (the relay does not register the content protocol), not by a
  content-scrubbing policy.

  In M1 the relay learns about sessions through a trusted in-process call from the directory
  at session establishment: `relay.recordAssignment(sessionAssignment)` (NODE-001). Relay-to-
  directory network authentication (out-of-process) is a later-milestone concern.

  Client-to-relay authentication reuses the Ed25519 challenge-response pattern with a distinct
  domain prefix `"CELLO-RELAY-AUTH-v1"` so a signature for one protocol cannot be replayed at
  another.

# ─── Behavior (EARS) ───────────────────────────────────────
behavior:
  - trigger: "When a client opens a libp2p stream on `/cello/relay/1.0.0`"
    action: >
      the relay shall issue a `relay_auth_challenge` frame `{nonce}` (32 bytes, CSPRNG,
      30-second TTL, single-use) and hold the stream unauthenticated until the challenge
      resolves, reusing the same auth state machine as NODE-001 with the domain string
      `"CELLO-RELAY-AUTH-v1"`.
  - trigger: "When the client responds with `relay_auth_response { pubkey, signature }`"
    action: >
      the relay shall verify the Ed25519 signature over `"CELLO-RELAY-AUTH-v1" || nonce ||
      pubkey` against the claimed pubkey. On success the stream is registered under that
      pubkey and marked authenticated. On failure the stream is reset with a structured
      `auth_failed` reason (`nonce_expired`, `nonce_unknown`, `nonce_reused`, or
      `signature_invalid`).
  - trigger: "When the directory supplies a session assignment via the in-process call `recordAssignment(sessionAssignment)`"
    action: >
      the relay shall (a) verify the directory signature on the SessionAssignment against the
      pinned directory-identity pubkey, (b) record the session: session_id (16 bytes),
      participant pubkeys (A, B), the signed assignment record, and the genesis prev_root
      computed per SESSION-002 as `SHA-256(sorted(A_pubkey, B_pubkey) || session_id ||
      session_timestamp)`, (c) initialise the per-session leaf log (empty) and the canonical
      sequence counter to 0. The call returns acknowledgement only after all of the above
      have completed successfully.
  - trigger: "When an authenticated client submits a `hash_submit { session_id, leaf_kind, structure1_cbor, sender_signature }` frame"
    action: >
      the relay shall (a) verify the client is a registered participant of the session,
      returning `not_a_participant` if the session exists but the client is not a participant,
      returning `session_not_found` if no such session is registered, (b) reject with
      `leaf_kind_invalid` if leaf_kind is any value other than `0x00` or `0x02`, (c) verify
      the sender's Ed25519 signature over canonical-CBOR(Structure 1) against the embedded
      sender_pubkey, (d) verify the sender_pubkey inside Structure 1 matches the connection's
      authenticated pubkey — reject with `sender_mismatch` otherwise, (e) verify the declared
      `last_seen_seq` in Structure 1 is <= the current canonical sequence counter — reject
      with `last_seen_seq_ahead` otherwise (a client cannot commit to having seen a future
      sequence number), (f) assign the next canonical sequence number, (g) compute prev_root
      as the Merkle root of the per-session tree over all prior leaves (for the first leaf,
      use the genesis prev_root from the session assignment), (h) construct Structure 2 per
      MERKLE-002 as the 6-element CBOR array with the M1 scan_result sentinel, (i) compute
      the leaf hash as `SHA-256(leaf_kind || canonical_CBOR(Structure 2))` and append to the
      tree, (j) deliver Structure 2 plus the `leaf_kind` byte to the counterparty's
      authenticated relay stream as a `leaf_deliver { session_id, leaf_kind, structure2_cbor }`
      frame.
  - trigger: "When the counterparty has no currently-authenticated stream to the relay"
    action: >
      the relay shall queue up to a small bounded number of pending `leaf_deliver` frames for
      that pubkey and deliver them on the counterparty's next authenticated stream. If the
      queue would exceed the bound (M1 default: 256 leaves), the oldest queued entry is
      dropped and a `relay_backpressure` event is logged against the session. Full recovery
      semantics (new-relay assignment, directory notification) are out of M1 scope — M1's
      queue bound is a liveness guard, not a recovery mechanism.
  - trigger: "When the directory requests a seal via the in-process call `submitForSeal(session_id)`"
    action: >
      the relay shall return the complete ordered list of Structure 2 leaves, the canonical
      sequence count, and the current Merkle root, and shall mark the session `sealing`.
      After the directory confirms the seal (via `confirmSeal(session_id, sealed_root)`), the
      relay shall destroy all per-session state (leaf log, tree nodes, counters, auth stream
      registrations scoped to the session). If the directory rejects the seal (via
      `rejectSeal(session_id, reason)`), the relay shall retain per-session state for
      investigation and shall mark the session `seal_rejected`.
  - trigger: "When a participant disconnects their relay stream during an active session"
    action: >
      the relay shall not destroy the session state (the participant may reconnect). On
      reconnect with a fresh auth handshake, the participant resumes from the current
      canonical sequence counter; the relay delivers any queued `leaf_deliver` frames that
      accumulated during the disconnect (subject to the 256-leaf bound above).
  - trigger: "While operating in any path"
    action: >
      the relay shall never open a stream on `/cello/content/1.0.0` or `/cello/signaling/1.0.0`.
      Those protocols are not registered on the relay's libp2p node. Relay-side libp2p
      configuration exposes only `/cello/relay/1.0.0` as an inbound handler, plus the libp2p
      control protocols required by the transport stack.

# ─── Acceptance Criteria ────────────────────────────────────
acceptance_criteria:
  - id: AC-001
    given: "A relay and an established session between authenticated clients A and B (genesis prev_root = G)"
    when: "A submits a `hash_submit` frame with leaf_kind = 0x00, a signed Structure 1 with content_hash = H1, last_seen_seq = 0"
    then: "The relay assigns sequence_number = 1, sets prev_root = G in Structure 2, delivers `leaf_deliver` to B's relay stream, and appends the leaf to the tree"
    test_type: integration
    component_under_test: relay

  - id: AC-002
    given: "An active session where A has already sent two message leaves (sequence numbers 1 and 2)"
    when: "A submits a `hash_submit` with leaf_kind = 0x00 and last_seen_seq = 2"
    then: "The relay assigns sequence_number = 3 and sets prev_root = Merkle root of the tree after leaves 1 and 2"
    test_type: integration
    component_under_test: relay

  - id: AC-003
    given: "An active session"
    when: "A submits a `hash_submit` where Structure 1's sender_pubkey = K_X (K_X is not A's authenticated pubkey)"
    then: "The relay rejects with `sender_mismatch`; no sequence number is assigned; the tree is unchanged"
    test_type: integration
    component_under_test: relay

  - id: AC-004
    given: "An active session between A and B, and a third authenticated client C who is not a participant"
    when: "C submits a `hash_submit` for this session_id with a valid self-signature"
    then: "The relay rejects with `not_a_participant`; no sequence number is assigned; the tree is unchanged"
    test_type: integration
    component_under_test: relay

  - id: AC-005
    given: "An active session where the canonical sequence counter is currently 2"
    when: "A submits a `hash_submit` declaring last_seen_seq = 5"
    then: "The relay rejects with `last_seen_seq_ahead`; no sequence number is assigned"
    test_type: integration
    component_under_test: relay

  - id: AC-006
    given: "An active session with 10 leaves appended"
    when: "The directory calls `submitForSeal(session_id)`"
    then: "The relay returns all 10 Structure 2 leaves in order plus the canonical sequence count and the current Merkle root; the root matches an independent recomputation from the returned leaf sequence via MERKLE-001"
    test_type: integration
    component_under_test: relay

  - id: AC-007
    given: "A session the directory has confirmed sealed via `confirmSeal`"
    when: "Any client submits a `hash_submit` for that session_id after the seal completes"
    then: "The relay rejects with `session_not_found` — per-session state has been destroyed; this is the same error returned for a session_id that was never registered"
    test_type: integration
    component_under_test: relay

  - id: AC-008
    given: "An authenticated participant of an active session"
    when: "The participant submits a `hash_submit` frame whose `leaf_kind` field is `0x01`, `0x03`, or any other value outside `{0x00, 0x02}`"
    then: "The relay rejects with `leaf_kind_invalid`; no sequence number is assigned; the tree is unchanged; no `leaf_deliver` is delivered to the counterparty"
    test_type: integration
    component_under_test: relay

  - id: AC-009
    given: "An authenticated client submits 50 valid `hash_submit` frames in rapid succession on an active session"
    when: "The relay processes them"
    then: "Sequence numbers 1 through 50 are assigned in strictly monotonic order; prev_root for leaf i equals the Merkle root of the tree after leaves 1..i-1; all 50 `leaf_deliver` frames are delivered to the counterparty's relay stream in submission order"
    test_type: integration
    component_under_test: relay

  - id: AC-010
    given: "A client authenticates to the relay with a challenge signature computed over the domain string `\"CELLO-DIR-AUTH-v1\"` (NODE-001's directory domain string) instead of `\"CELLO-RELAY-AUTH-v1\"`"
    when: "The relay verifies the challenge"
    then: "The signature fails to verify; the stream is reset with `auth_failed: signature_invalid`; the client is not registered"
    test_type: integration
    component_under_test: relay

  - id: AC-011
    given: "A running relay libp2p node"
    when: "A client attempts to open a stream on `/cello/signaling/1.0.0` or `/cello/content/1.0.0` against the relay's Peer ID"
    then: "The stream open fails with `protocol_not_supported` — the relay does not register handlers for those protocols"
    test_type: integration
    component_under_test: relay

  - id: AC-012
    given: "An active session where B's relay stream has disconnected mid-session; A submits a `hash_submit` while B is offline"
    when: "B reconnects and re-authenticates to the relay"
    then: "The relay delivers the queued `leaf_deliver` frame(s) to B on the fresh stream; the canonical sequence numbers match what A submitted; B's local tree can be reconstructed to match the relay's tree"
    test_type: integration
    component_under_test: relay

# ─── Security Invariants ───────────────────────────────────
security_invariants:
  - id: SI-001
    statement: >
      The relay shall never register an inbound handler for `/cello/content/1.0.0`. The
      architectural content-isolation invariant is enforced at the protocol-registration
      level — the relay has no topological path to plaintext message content.
    adversarial_condition: >
      even when a misconfiguration or future library default would otherwise register a
      content handler — the relay's createNode contract fixes the handler list; the test
      asserts the exposed protocol set by inspecting the started node.
    test_type: integration
    component_under_test: relay

  - id: SI-002
    statement: >
      The relay shall never issue duplicate or non-monotonic canonical sequence numbers
      within a single session.
    adversarial_condition: >
      even when 100 `hash_submit` frames from both participants arrive concurrently — a
      per-session serialization queue ensures strictly monotonic assignment.
    test_type: integration
    component_under_test: relay

  - id: SI-003
    statement: >
      The relay shall never construct a Structure 2 whose embedded sender_signature (from the
      submitted Structure 1) does not verify against canonical-CBOR(Structure 1) under the
      sender_pubkey inside Structure 1.
    adversarial_condition: >
      even when a client submits a Structure 1 with a valid-looking but forged signature —
      the relay rejects at submission time.
    test_type: integration
    component_under_test: relay

  - id: SI-004
    statement: >
      The relay shall never deliver a `leaf_deliver` frame to a client that is not the
      counterparty of the session the submission originated from.
    adversarial_condition: >
      even when an attacker authenticated under K_X guesses a session_id and attempts to
      inject a `hash_submit` into it; session_id guessability is addressed by SESSION-002's
      128-bit CSPRNG session IDs (NODE-001 SI-002) and by returning `session_not_found` both
      for unregistered and for sealed-and-destroyed sessions (no probe channel).
    test_type: integration
    component_under_test: relay

  - id: SI-005
    statement: >
      The relay shall destroy all per-session Merkle state (leaf log, tree nodes, counters,
      session-scoped auth registrations) after the directory calls `confirmSeal`. No
      sealed-session state persists on the relay.
    adversarial_condition: >
      even when a post-seal forensic query or a bug in the seal confirmation path could
      otherwise cause data to linger — the destruction is synchronous with the confirmSeal
      return.
    test_type: integration
    component_under_test: relay

# ─── Degraded Behavior ─────────────────────────────────────
degraded_behavior:
  - id: DB-001
    condition: "While a participant's relay stream is disconnected during an active session"
    fallback: >
      the relay retains the per-session state (leaf log, tree, counter) and queues up to
      256 `leaf_deliver` frames for that participant. On reconnect and successful re-auth,
      the relay flushes the queued deliveries. If the queue bound is exceeded the oldest
      entry is dropped and a `relay_backpressure` event is logged against the session —
      the session is not marked desynchronized solely on a queue-drop event, but the
      receiving client will detect the gap when its Structure 2 receive stream skips a
      sequence number and will fail closed per MSG-004.
    test_type: integration
    component_under_test: relay

  - id: DB-002
    condition: "While the directory rejects a seal via `rejectSeal(session_id, reason)`"
    fallback: >
      the relay retains per-session state, marks the session `seal_rejected`, and does not
      destroy the leaf log or tree. No further `hash_submit` frames are accepted on the
      session (it is no longer in `active` state). Operational recovery from a seal
      rejection is out of M1 scope; the state is retained for post-hoc investigation.
    test_type: integration
    component_under_test: relay

