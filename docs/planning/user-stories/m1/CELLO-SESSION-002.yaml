# ─── Identity ───────────────────────────────────────────────
id: CELLO-SESSION-002
domain: Session Lifecycle
actor: CLIENT
priority: P0
components:
  - client
  - directory
  - relay

# ─── Intent ─────────────────────────────────────────────────
story: >
  As the CELLO Client,
  I want session establishment in M1 to issue a signed SessionAssignment carrying both participants' Peer IDs and multiaddrs plus the relay endpoint, and to initialize a genesis `prev_root` deterministically from sorted participant pubkeys
  so that after session establishment the two participants can dial each other directly for content on `/cello/content/1.0.0`, can dial the relay for hashes on `/cello/relay/1.0.0`, and all three parties (sender, receiver, relay) derive byte-identical genesis `prev_root` values regardless of who initiated.

  This replaces SESSION-001's directory-as-relay model. In M1 the directory is a bookend
  authority on `/cello/signaling/1.0.0`: it generates the session_id, picks the relay, signs
  the SessionAssignment, pushes it to both clients, and hands the same signed record to the
  relay in-process (NODE-001). Once the relay is assigned and both clients have authenticated
  to it, hashes flow client↔relay on `/cello/relay/1.0.0`. Content flows peer↔peer on
  `/cello/content/1.0.0` — the clients dial each other using the Peer IDs and multiaddrs
  the SessionAssignment carried.

  **Three independent libp2p connections per active session:**

  - Client ↔ Directory (`/cello/signaling/1.0.0`) — open before session request, stays open
    during active session for notifications (seal events, future tombstones), closes on
    client disconnect. Directory never sees hashes or content.
  - Client ↔ Relay (`/cello/relay/1.0.0`) — opened after receiving SessionAssignment. Each
    client establishes its own relay stream. Relay sees only hashes (Structure 1 / Structure 2).
  - Client ↔ Client (`/cello/content/1.0.0`) — opened after receiving SessionAssignment. The
    two participants dial each other directly using Peer IDs + multiaddrs. Content flows
    only through this peer-to-peer path.

  FROST is not yet present — session establishment is K_local only. The directory signs the
  SessionAssignment with a single directory-identity key pinned in client configuration
  (NODE-001). M2 replaces the single key with the FROST threshold ceremony.

  Genesis `prev_root` is initialised by sorted participant pubkeys:
  `SHA-256(min(A_pubkey, B_pubkey) || max(A_pubkey, B_pubkey) || session_id ||
  session_timestamp)`. Sorting makes the value deterministic regardless of who initiated,
  which keeps the two-party case consistent with the N-party anchor from agent-client.md
  AC-C2. `session_timestamp` is encoded as an 8-byte big-endian unsigned integer
  (milliseconds since Unix epoch) for the pre-CBOR concatenation — CBOR-encoding the
  timestamp at this boundary would introduce width ambiguity. The genesis prev_root bytes
  are pinned in `packages/protocol-types/test/vectors/genesis-prev-root.json` so the
  client, the relay, and the future Rust port all produce the identical genesis value.

# ─── Behavior (EARS) ───────────────────────────────────────
behavior:
  - trigger: "When an authenticated client sends a `session_request { target_pubkey }` frame on its signaling stream"
    action: >
      the directory shall execute the strict-order sequence from NODE-001: verify target is
      authenticated → generate session_id → select relay → construct and sign the
      SessionAssignment → synchronously call `relay.recordAssignment(record)` and await
      acknowledgement → push `session_assignment` frames to both clients' signaling streams.
      The SessionAssignment record carries:
      `{session_id, participants: [{pubkey, peer_id, multiaddrs[]}, {pubkey, peer_id,
      multiaddrs[]}], relay_endpoint: {peer_id, multiaddrs[]}, session_timestamp,
      directory_pubkey}`. The directory's signature is over the canonical-CBOR encoding of
      this record.
  - trigger: "When a client receives a `session_assignment` frame on its signaling stream"
    action: >
      the client shall (a) verify the directory signature against the pinned directory
      pubkey, discarding the assignment on failure, (b) compute the genesis prev_root
      locally as `SHA-256(min(A_pubkey, B_pubkey) || max(A_pubkey, B_pubkey) || session_id ||
      session_timestamp)` where the pubkey ordering is bytewise-lexicographic and
      session_timestamp is encoded as an 8-byte big-endian unsigned integer, (c) store the
      session record `{session_id, counterparty_pubkey, counterparty_peer_id,
      counterparty_multiaddrs, relay_endpoint, genesis_prev_root, last_seen_seq = 0,
      status: 'active'}`, (d) dial the relay endpoint on `/cello/relay/1.0.0` and complete
      NODE-002's challenge-response with the domain `"CELLO-RELAY-AUTH-v1"`, (e) dial the
      counterparty on `/cello/content/1.0.0` (see MSG-004) using the Peer ID and multiaddrs
      from the assignment.
  - trigger: "When the relay receives a SessionAssignment via `recordAssignment`"
    action: >
      the relay shall (a) verify the directory signature against its pinned directory
      pubkey, (b) compute the same genesis prev_root locally using the sorted-pubkey
      formula, (c) register the session with counter = 0 and an empty leaf log, and (d)
      accept participant authentications for that session on `/cello/relay/1.0.0`.
  - trigger: "When a client's signaling stream closes mid-establishment before it has authenticated to the relay"
    action: >
      the directory shall instruct the relay in-process to discard its provisional session
      state and shall not persist a partially-established session. (Streams closed AFTER the
      client has authenticated to the relay leave the session intact — see SI-001 and
      degraded behavior below.)
  - trigger: "When session establishment is requested toward a target pubkey that is not currently authenticated on a signaling stream"
    action: >
      the directory shall return `target_offline` on the initiator's signaling stream; no
      session_id is allocated; no relay assignment is made (NODE-001 AC-008).
  - trigger: "When the client inspects its active session list"
    action: >
      the client shall return each session's `session_id, counterparty_pubkey,
      counterparty_peer_id, relay_endpoint, status ('active' | 'transport_lost' | 'sealing'
      | 'sealed'), and the current last_seen_seq`.

# ─── Acceptance Criteria ────────────────────────────────────
acceptance_criteria:
  - id: AC-001
    given: "Two clients A and B authenticated to the directory on their signaling streams"
    when: "A sends `session_request { target_pubkey: B_pubkey }`"
    then: >
      Both clients receive a `session_assignment` frame carrying the same session_id, the
      same relay endpoint (peer_id + multiaddrs), and the same pair of participant entries;
      the directory signature on the record verifies against the pinned directory pubkey;
      the relay has recorded the same session with an empty tree before the frames arrive
      at the clients
    test_type: integration
    component_under_test: directory

  - id: AC-002
    given: "Two clients have received matching `session_assignment` frames"
    when: "Each client and the relay compute the genesis prev_root locally"
    then: >
      All three parties produce byte-identical genesis prev_root values equal to
      `SHA-256(min(A_pubkey, B_pubkey) || max(A_pubkey, B_pubkey) || session_id ||
      session_timestamp_be8)` where `session_timestamp_be8` is the 8-byte big-endian
      encoding of the millisecond timestamp. The produced bytes match the expected hex in
      `packages/protocol-types/test/vectors/genesis-prev-root.json` for the corresponding
      fixture inputs
    test_type: integration
    component_under_test: client

  - id: AC-003
    given: "A client has received a `session_assignment` frame"
    when: "The client dials the relay endpoint and responds to the relay's challenge with a signature over `\"CELLO-RELAY-AUTH-v1\" || nonce || pubkey`"
    then: "The relay accepts the authentication and associates the stream with the client's participant role in the session"
    test_type: integration
    component_under_test: relay

  - id: AC-004
    given: "A session assignment has been issued, both clients have authenticated to the relay, and both clients have dialed each other on `/cello/content/1.0.0`"
    when: "Each client queries its active session list"
    then: "Both show the session with status 'active', the correct counterparty_pubkey, the correct counterparty_peer_id, the relay_endpoint, and last_seen_seq = 0"
    test_type: integration
    component_under_test: client

  - id: AC-005
    given: "A client receives a `session_assignment` frame whose directory signature has been tampered (one bit flipped)"
    when: "The client verifies the signature"
    then: "Verification fails; the client discards the assignment, does not dial the relay, does not dial the counterparty, and logs a `directory_signature_invalid` event"
    test_type: integration
    component_under_test: client

  - id: AC-006
    given: "Client A authenticated; pubkey K_B is not currently authenticated on any signaling stream"
    when: "A sends `session_request { target_pubkey: K_B }`"
    then: "The directory returns `target_offline` on A's signaling stream; no session_id is allocated; the relay receives no assignment"
    test_type: integration
    component_under_test: directory

  - id: AC-007
    given: >
      A running directory and relay with a test hook that records (a) `recordAssignment`
      return-time and (b) the time at which each client observes its `session_assignment`
      frame; sessions are established between 256 distinct authenticated client pairs in
      rapid succession (starting bound; can increase to 1,000 if CI budget permits. 256 is
      sufficient for a chi-squared sanity check at p > 0.0001 on CSPRNG session_ids)
    when: "All 256 sessions complete"
    then: >
      Every session_id is unique; each is exactly 16 bytes; the chi-squared test on
      concatenated session_id bytes against a uniform distribution yields p > 0.0001; for
      every session `recordAssignment` return-time is strictly earlier than the earlier of
      the two `session_assignment` frame observation times
    test_type: integration
    component_under_test: directory

  - id: AC-008
    given: "A session has been established and both clients have authenticated to the relay and opened content streams"
    when: "The signaling stream is closed for one of the clients"
    then: >
      The client's directory status transitions to `directory_unreachable` but the relay
      stream and content stream remain intact; hash_submit still works on that session; the
      content-path send still works; both clients' session state remains `active` until
      natural close or a transport-loss timeout
    test_type: integration
    component_under_test: client

  - id: AC-009
    given: "A test configuration where `relay.recordAssignment` is stubbed to reject"
    when: "Client A requests a session with Client B"
    then: >
      The directory returns `relay_unavailable` to A on its signaling stream; no
      `session_assignment` frame is delivered to either client; the relay holds no state
      for the attempted session_id
    test_type: integration
    component_under_test: directory

  - id: AC-010
    given: >
      A directory that has just signed a SessionAssignment but has NOT yet called
      `relay.recordAssignment` (simulated via a test hook that stalls the call). An attacker
      authenticated as client C (not a participant) somehow guesses the session_id and opens
      a relay stream
    when: "C submits a `hash_submit` for the stalled session_id"
    then: >
      The relay returns `session_not_found` — the same error code returned for a session
      that has been sealed and destroyed. Pre-registration and post-seal are
      indistinguishable to any probe, preventing any side channel that would leak
      session_ids before clients are aware of them
    test_type: integration
    component_under_test: relay

  - id: AC-011
    given: "A running directory and client A. A requests a session with B. A's signaling stream closes after the directory has signed the assignment but BEFORE A receives the assignment frame"
    when: "The directory processes the stream close"
    then: "The directory treats the session as partially established, instructs the relay to discard its provisional state, and does not persist the session. B is notified with `session_abandoned` on B's signaling stream if B already received its assignment"
    test_type: integration
    component_under_test: directory

# ─── Security Invariants ───────────────────────────────────
security_invariants:
  - id: SI-001
    statement: >
      The directory shall create a session only when both parties are concurrently
      authenticated under the pubkeys named in the session-initiate request AND shall never
      deliver a `session_assignment` frame for a session_id the relay has not yet registered
      via `recordAssignment`.
    adversarial_condition: >
      even when an attacker initiates toward a pubkey that is offline or represented by a
      hung signaling stream that has not completed challenge-response; and even when a
      client races its relay stream open against the session-establishment sequence — the
      relay rejects any `hash_submit` carrying an unregistered session_id with
      `session_not_found`, identical to the sealed-and-destroyed error, providing no
      distinguishability between the two states.
    test_type: integration
    component_under_test: directory

  - id: SI-002
    statement: >
      The directory shall generate session_ids as 16 bytes from a CSPRNG, no collisions with
      active or recently-closed sessions.
    adversarial_condition: >
      even when 256+ sessions are created in rapid succession (extensible to 1,000 when CI
      budget permits); 128 bits of entropy from a CSPRNG makes brute-force guessing
      infeasible.
    test_type: integration
    component_under_test: directory

  - id: SI-003
    statement: >
      The client shall never participate in a session whose `session_assignment` frame fails
      signature verification against the pinned directory pubkey, and shall never treat a
      SessionAssignment as valid without first verifying the signature.
    adversarial_condition: >
      even when a MITM on the signaling stream substitutes a forged assignment with a
      plausible-looking relay endpoint — libp2p's Noise transport prevents packet
      substitution, and signature verification catches a malicious directory pretending to
      be the pinned identity. Both layers are independent defenses.
    test_type: integration
    component_under_test: client

  - id: SI-004
    statement: >
      The genesis `prev_root` shall be computed from exactly the bytes
      `min(A_pubkey, B_pubkey) || max(A_pubkey, B_pubkey) || session_id ||
      session_timestamp_be8` where pubkey ordering is bytewise-lexicographic and
      `session_timestamp_be8` is an 8-byte big-endian unsigned integer encoding of
      milliseconds since Unix epoch.
    adversarial_condition: >
      even when initiator-first ordering would be simpler — sorted pubkeys make genesis
      prev_root deterministic regardless of which party initiated and keeps the two-party
      case consistent with agent-client.md's N-party anchor (AC-C2). A fixture with
      expected genesis hex is committed under `packages/protocol-types/test/vectors/
      genesis-prev-root.json`; both the client and the relay must match it exactly.
    test_type: unit
    component_under_test: protocol-types

# ─── Degraded Behavior ─────────────────────────────────────
degraded_behavior:
  - id: DB-001
    condition: "While the client's relay stream is disconnected mid-session"
    fallback: >
      the client shall mark the session `transport_lost`, surface the event to the agent on
      the next MCP call referencing the session, and reject send/close on it with
      `transport_unavailable`. Session resumption after reconnect is covered by NODE-002
      DB-001 (relay flushes queued `leaf_deliver` frames after re-auth). If the disconnect
      persists beyond an M1-configurable timeout (default 60s), the client treats the
      session as effectively closed and does not attempt resumption.
    test_type: integration
    component_under_test: client

  - id: DB-002
    condition: "While the counterparty's content stream (`/cello/content/1.0.0`) is disconnected mid-session"
    fallback: >
      the client shall attempt to redial the counterparty using the Peer ID and multiaddrs
      from the cached SessionAssignment. If redial succeeds within the transport-loss
      timeout (default 60s), the session continues. If it fails, the session is marked
      `transport_lost` and further sends/receives are rejected with
      `transport_unavailable`. New-multiaddr discovery (e.g., via a directory-mediated
      refresh) is out of M1 scope.
    test_type: integration
    component_under_test: client

