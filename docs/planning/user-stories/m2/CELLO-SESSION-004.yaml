# ─── Identity ───────────────────────────────────────────────
id: CELLO-SESSION-004
domain: Session Lifecycle
actor: CLIENT
priority: P0
components:
  - client
  - directory
  - crypto

# ─── Intent ─────────────────────────────────────────────────
story: >
  As the CELLO Client,
  I want session establishment authenticated via a FROST ceremony replacing the
  single directory signing key from M1
  so that neither the client alone nor the directory alone can forge a session —
  compromise of K_local is detectable at the next session establishment attempt.

  **What changes from M1 (SESSION-002):**
  - The `SessionAssignment` frame gains `signature_type: 'frost'`. The `signature`
    field carries the combined FROST output (64 bytes, same length as an Ed25519
    signature). M1 frames carrying `signature_type: 'single'` are refused with
    `unsupported_signature_type` — same hard-cut pattern as the M1 protocol_version
    bump.
  - The client verifies the FROST-signed `SessionAssignment` against `primary_pubkey`
    (the group public key stored at DKG time per CRYPTO-003).
  - Before issuing the `SessionAssignment`, the directory runs a FROST ceremony on
    `/cello/frost/1.0.0` co-signing the session establishment TBS with the client
    as coordinator.

  **FROST TBS for session establishment (from CONTEXT.md):**
  Context string: `"cello-frost-session-establishment-v1"`
  Fields: `[session_id, agent_A_pubkey, agent_B_pubkey, genesis_prev_root, timestamp]`
  The domain context string prevents a seal signature from being replayed as an
  establishment signature.

  **Ceremony flow:**
  1. Agent A (the initiator) calls `cello_initiate_session({ target_pubkey: B_pubkey })`.
  2. The client sends a session request to the directory over `/cello/signaling/1.0.0`.
  3. The directory assigns `session_id`, `genesis_prev_root`, relay endpoint, and
     counterparty Peer IDs.
  4. The initiating client (A), acting as FROST coordinator, opens `/cello/frost/1.0.0`
     streams to t-of-n directory nodes and runs the ceremony with the session
     establishment TBS. The directory nodes contribute their K_server_X shares for
     agent A — the group being signed with is A's FROST group.
  5. The combined FROST signature is embedded in the `SessionAssignment` as
     `signature_type: 'frost'`, alongside `signer_pubkey: A_primary_pubkey` so that
     the counterparty can verify.
  6. The directory sends the signed `SessionAssignment` to both agents via their
     signaling streams.
  7. Agent A verifies the FROST signature against its own `primary_pubkey` (it
     coordinated the ceremony). Agent B verifies against the `signer_pubkey` field
     in the SessionAssignment (A's `primary_pubkey`). In M2, B obtains A's
     `primary_pubkey` from the SessionAssignment; in M3+, B can additionally
     cross-check it against the directory's stored profile for A.

  **Why the initiator's group signs establishment:** The FROST signature proves that
  the initiating agent's K_local actively participated — a stolen K_local that
  attempts a competing ceremony triggers the conflict detector (NODE-003). The
  receiver does not need to co-sign establishment; they prove liveness by accepting
  the session and engaging in the conversation (and by co-signing the seal at close).

  **In M2 the accept/decline step remains stubbed** (both agents are pre-authorized
  in the test harness). M3 replaces the stub with the full accept/decline flow.
  The `SessionAssignment` format is unchanged between M2 and M3 — only the
  signature field changes from M1 to M2.

# ─── Behavior (EARS) ───────────────────────────────────────
behavior:
  - trigger: "When the client initiates session establishment and the directory has assigned session parameters"
    action: >
      the client shall act as FROST coordinator: construct the session establishment
      TBS `[session_id, agent_A_pubkey, agent_B_pubkey, genesis_prev_root, timestamp]`,
      call `IThresholdSigner.participateInCeremony` with context
      `"cello-frost-session-establishment-v1"`, and return the resulting
      `ThresholdSignature` to the directory. The directory embeds the signature in the
      `SessionAssignment` with `signature_type: 'frost'` and
      `signer_pubkey: initiator_primary_pubkey` before delivering to both clients.

  - trigger: "When the client receives a `SessionAssignment` frame with `signature_type: 'frost'`"
    action: >
      the client shall reconstruct the session establishment TBS from the frame fields
      and verify the FROST signature using `@noble/curves/frost` with context
      `"cello-frost-session-establishment-v1"`. The verification key depends on role:
      (a) the initiator verifies against its own stored `primary_pubkey` (it
      coordinated this ceremony); (b) the counterparty verifies against the
      `signer_pubkey` field carried in the SessionAssignment (the initiator's
      `primary_pubkey`). The session is accepted only if verification succeeds.

  - trigger: "When the client receives a `SessionAssignment` frame with `signature_type: 'single'`"
    action: >
      the client shall reject it with `unsupported_signature_type` — M1 single-key
      session assignments are not accepted in M2.

  - trigger: "If the FROST ceremony fails with `DIRECTORY_BELOW_THRESHOLD` during session establishment"
    action: >
      the client shall surface `{ error: { reason: 'DIRECTORY_BELOW_THRESHOLD' } }`
      to the calling agent and not create a session record. No partial state is
      persisted.

  - trigger: "If the FROST ceremony for session establishment detects a `CEREMONY_CONFLICT` (reported by a directory node)"
    action: >
      the client shall surface `{ error: { reason: 'CEREMONY_CONFLICT' } }` to the
      calling agent, not create a session record, and note that the owner should
      be alerted (alert delivery is a M7 concern; in M2 the client logs the event).

# ─── Acceptance Criteria ────────────────────────────────────
acceptance_criteria:
  - id: AC-001
    given: "Two agents A and B each with bootstrapped K_server_X shares (2-of-3 threshold, 3 in-process directory nodes); A is the initiator"
    when: "A calls `cello_initiate_session({ target_pubkey: B_pubkey })`"
    then: >
      A FROST ceremony runs with A as coordinator using A's K_server_X shares; the
      resulting `SessionAssignment` carries `signature_type: 'frost'` and
      `signer_pubkey: A_primary_pubkey`; A verifies against its own `primary_pubkey`;
      B verifies against the `signer_pubkey` field; the session transitions to
      `active` on both clients
    test_type: e2e
    component_under_test: client

  - id: AC-002
    given: "A `SessionAssignment` frame carrying `signature_type: 'frost'`"
    when: "The FROST signature is tampered (one byte flipped)"
    then: >
      Signature verification fails; the client rejects the session establishment
      with a verification error; no session record is created
    test_type: unit
    component_under_test: client

  - id: AC-003
    given: "A `SessionAssignment` frame carrying `signature_type: 'single'` (an M1-era frame)"
    when: "An M2 client receives it"
    then: "The client rejects with `unsupported_signature_type`; no session is created"
    test_type: unit
    component_under_test: client

  - id: AC-004
    given: "Fewer than `threshold` directory nodes are reachable when session establishment is attempted"
    when: "The client initiates the FROST ceremony"
    then: >
      `DIRECTORY_BELOW_THRESHOLD` is returned to the agent; no partial session state
      is written; the client is in the same state as before the attempt
    test_type: integration
    component_under_test: client

  - id: AC-005
    given: "An active FROST establishment ceremony for agent A; a second establishment attempt for agent A arrives from a different Peer ID"
    when: "A directory node detects the conflict"
    then: >
      The directory node fires `CEREMONY_CONFLICT`; the second attempt is rejected;
      the first ceremony continues; the conflict event is logged on the directory
    test_type: integration
    component_under_test: directory

  - id: AC-006
    given: "A session established via FROST"
    when: "A sends a message and B receives it"
    then: >
      The message exchange proceeds identically to M1 (dual-path, Structure 1/2,
      relay sequencing) — FROST only changes the session bookends, not the
      per-message flow
    test_type: e2e
    component_under_test: client

  - id: AC-007
    given: "Two agents A and B each with their own `primary_pubkey` from independent DKG sessions; A initiates a session"
    when: "The `SessionAssignment` FROST signature arrives at B"
    then: >
      B verifies against the `signer_pubkey` field in the SessionAssignment (which
      is A's `primary_pubkey`) — not against B's own `primary_pubkey`. Verification
      succeeds. If B attempts verification against its own `primary_pubkey` instead,
      verification fails — each agent's FROST group produces signatures verifiable
      only against that agent's group key.
    test_type: integration
    component_under_test: client

# ─── Security Invariants ───────────────────────────────────
security_invariants:
  - id: SI-001
    statement: >
      The client shall never accept a `SessionAssignment` whose FROST signature
      does not verify against the appropriate verification key (own `primary_pubkey`
      for initiator; `signer_pubkey` from the frame for counterparty)
    adversarial_condition: >
      even when the `SessionAssignment` fields (session_id, pubkeys, relay endpoint)
      are otherwise valid — a missing or incorrect FROST signature means the
      initiator's K_local did not participate in the ceremony and the session is not
      authenticated
    test_type: unit
    component_under_test: client

  - id: SI-002
    statement: >
      A session establishment FROST signature shall not verify as a valid seal
      signature, and vice versa
    adversarial_condition: >
      even when an attacker replays a captured establishment signature in a seal
      context — the RFC 9591 domain context strings prevent cross-ceremony confusion
    test_type: unit
    component_under_test: client

  - id: SI-003
    statement: >
      The client shall never create a session record for a `SessionAssignment`
      with `signature_type: 'single'`
    adversarial_condition: >
      even when all other fields in the frame are valid and the single-key
      signature itself verifies — M2 hard-cuts single-key session establishment
    test_type: unit
    component_under_test: client

# ─── Degraded Behavior ─────────────────────────────────────
degraded_behavior:
  - id: DB-001
    condition: "While the directory is unreachable when a new session establishment is attempted"
    fallback: >
      the client shall refuse new session establishments with
      `{ error: { reason: 'DIRECTORY_UNREACHABLE' } }`. Existing active sessions
      are unaffected — per-message signing uses K_local only and does not require
      the directory. New sessions cannot be established without the FROST ceremony.
    test_type: integration
    component_under_test: client

