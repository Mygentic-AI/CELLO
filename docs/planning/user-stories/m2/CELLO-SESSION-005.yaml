    why: "The MMR (global sealed-conversation ledger) and its client-side inclusion proof verification land with M10 Federation."
    replaced_by: "CELLO-M10 MMR story — `mmr_peak` field transitions from `null` to a real value when the MMR is built"

  - what: "CLEAN/FLAGGED attestations on the SEAL control leaf"
    why: "Attestation semantics require compromise detection and arbitration machinery that M7 introduces."
    replaced_by: "CELLO-M7 session close attestation stories — `attestation` field transitions from `'PENDING'` to `'CLEAN'` or `'FLAGGED'`"

